<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="color-scheme" content="light"/>
<title>【오사카온누리】오늘의 성경 암송</title>

<style>
:root{
  --bg:#f4f8ff;
  --card:#ffffff;
  --primary:#2f6fed;
  --primary-soft:#eaf1ff;
  --text:#1c2433;
  --muted:#6b768a;
  --border:#e3eaf5;
  --radius:18px;
}

*{box-sizing:border-box;}
body{
  margin:0;
  font-family: -apple-system,BlinkMacSystemFont,"Noto Sans KR",system-ui,sans-serif;
  background: linear-gradient(180deg,#eef4ff 0%,#f9fbff 100%);
  color:var(--text);
}

.safe{
  padding:max(16px,env(safe-area-inset-top)) 16px max(24px,env(safe-area-inset-bottom)) 16px;
}

.wrap{max-width:760px;margin:auto;display:flex;flex-direction:column;gap:16px;}

header{
  padding:18px 16px 10px 16px;
}
h1{
  margin:0;
  font-size:20px;
  font-weight:800;
  color:var(--primary);
}
.sub{
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
}

.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:0 8px 24px rgba(47,111,237,.08);
  border:1px solid var(--border);
}

.cardPad{padding:18px;}

.badge{
  display:inline-block;
  padding:6px 12px;
  background:var(--primary-soft);
  color:var(--primary);
  font-weight:700;
  font-size:13px;
  border-radius:999px;
}

.title{
  margin-top:10px;
  font-size:18px;
  font-weight:800;
}

.meta{
  font-size:13px;
  color:var(--muted);
  margin-top:2px;
}

.sectionTitle{
  margin-top:18px;
  font-size:13px;
  font-weight:700;
  color:var(--muted);
}

.verseBox{
  margin-top:6px;
  padding:16px;
  border-radius:14px;
  background:var(--primary-soft);
  border:1px solid #dce6ff;
  font-size:18px;           /* 🔥 더 크게 */
  font-weight:700;          /* 🔥 더 진하게 */
  line-height:1.6;
}

.explainBox{
  margin-top:6px;
  padding:14px;
  border-radius:14px;
  background:#fafcff;
  border:1px solid var(--border);
  font-size:15px;
  line-height:1.6;
  color:#3a4658;
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media(max-width:480px){
  .controls{grid-template-columns:1fr;}
}

label{
  font-size:12px;
  color:var(--muted);
  display:block;
  margin-bottom:6px;
}

input[type="date"]{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:16px;
  background:#fff;
  -webkit-appearance:none;
}

button{
  padding:12px;
  border-radius:12px;
  border:none;
  background:var(--primary);
  color:white;
  font-size:15px;
  font-weight:700;
  margin-top:12px;
}

button.secondary{
  background:#e1e9ff;
  color:var(--primary);
}

.status{
  margin-top:12px;
  font-size:13px;
  color:var(--muted);
}
</style>
</head>

<body>
<div class="safe">
<div class="wrap">

<header>
<h1>오늘의 성경 암송</h1>
<div class="sub">페이지를 열면 자동으로 오늘 암송이 표시됩니다.</div>
</header>

<div class="card">
<div class="cardPad" id="resultArea"></div>
</div>

<div class="card">
<div class="cardPad">

<div class="controls">
<div>
<label>시작일 (암송1)</label>
<input id="startDate" type="date"/>
</div>
<div>
<label>조회 날짜</label>
<input id="targetDate" type="date"/>
</div>
</div>

<button id="btnToday" class="secondary">오늘로</button>
<button id="btnShow">조회</button>

<div class="status" id="statusBox"></div>

</div>
</div>

</div>
</div>

<script>
const VERSES = [{"no":1,"ref":"창세기 1:1","title":"천지 창조","verse":"태초에 하나님이 천지를 창조하시니라.","explanation":"이 세상의 시작은 하나님입니다. 하나님은 말씀으로 천지를 창조하셨습니다."},
                {"no":2,"ref":"창세기 1:26","title":"인간 창조","verse":"하나님이 이르시되 우리의 형상을 따라 우리의 모양대로 우리가 사람을 만들고…","explanation":"천지와 사람을 만드신 분은 성부 하나님 뿐 아니라 성자 하나님이신 예수님과 우리 안에 내주하시는성령 하나님이 '함께' 창조하셨습니다. 그래서 하나님뿐 아니라 예수님도, 성령님도 나를 잘 아십니다."},
                {"no":3,"ref":"창세기 1:28","title":"땅의 통치권 위임 명령","verse":"하나님이 그들에게 복을 주시며 하나님이 그들에게 이르시되 생육하고 번성하여 땅에 충만하라, 땅을 정복하라, 바다의 물고기와 하늘의 새와 땅에 움직이는 모든생물을 다스리라 하시니라.","explanation":"하나님은 인간에게 통치권을 위임해 주셨습니다.범위는 땅이고, 대상은 모든 생물입니다. 권위의 순서는'하나님->하나님의 형상을 가진 인간(시8:5)->하나님과 인간을 섬기도록 만들어진 천사->타락한 천사인사단' 입니다."},
                {"no":4,"ref":"창세기 2:17","title":"하나님의 순종명령","verse":"선악을 알게 하는 나무의 열매는 먹지 말라 네가 먹는날에는 반드시 죽으리라 하시니라.","explanation":"순종명령은 인간에게 주신 자유의지(결정권한)입니다. 자유의지는 하나님의 형상대로 지음 받은 증거입니다. 하나님은 인간이 배반할 가능성이 있음에도 불구하고, 자발적 결정을 통하여 하나님이 기뻐하는 것을선택하는 인간과 교제하시길 원하셨습니다. 하나님 편에서는 하나님 스스로 자신의 권한을 제한하신 것이고, 인간 편에서는 하나님의 생명력이 부어지는 일입니다."},
                {"no":5,"ref":"이사야 14:12~15","title":"천사계 타락","verse":"너 아침의 아들 계명성이여 어찌 그리 하늘에서 떨어졌으며, 너 열국을 엎은 자여 어찌 그리 땅에 찍혔는고.네가 네 마음에 이르기를 내가 하늘에 올라 하나님의 뭇 별 위에 내 자리를 높이리라. 내가 북극 집회의 산위에 앉으리라. 가장 높은 구름에 올라가 지극히 높은이와 같아지리라 하는도다. 그러나 이제 네가 스올 곧 구덩이 맨 밑에 떨어짐을 당하리로다.","explanation":"실존했던 바벨론 왕과 타락한 천사인 사단에 대한 중의적 심판 내용입니다. 사단은 원래 아름다운 존재(계명성)로 창조되었지만, 하나님과 같이 되려는, 가장 높은 자리의 주인이 되고자 했던 교만으로 타락하게 되었습니다. 하나님과 같이 되려다 타락한 사단은 인간계의 아담에게도 똑같은 원인(선악과를 먹으면 하나님과 같이 될거야, 창 3:5)으로 타락하게 만듭니다."},
                {"no":6,"ref":"에스겔 28:2","title":"천사계 타락","verse":"인자야 두로 왕에게 이르기를 주 여호와께서 이같이 말씀하시되 네 마음이 교만하여 말하기를 나는 신이라 내가 하나님의 자리 곧 바다 가운데에 앉았 있다 하도다. 네 마음이 하나님의 마음 같은 체할지라도 너는 사람이요 신이 아니거늘.","explanation":"실존했던 두로 왕과 타락한 천사인 사단에 대한 중의적 심판으로, 사단은 하나님의 자리에 앉고자 했습니다. 타락의 시작은 내가 하나님의 자리에 앉아 주인행세를 하면서부터 입니다. 모든 권세의 주인이신 하나님을 배반하고 자신이 하나님의 자리에 앉아 주인 되는것은 하나님에 대해 죄를 짓는 것이고, 이것이 원죄이며, 하나님의 심판을 받게 됩니다."},
                {"no":7,"ref":"창세기 3:5","title":"원죄, 하나님의 자리 넘봄","verse":"너희가 그것을 먹는 날에는 너희 눈이 밝아져 하나님과 같이 되어 선악을 알 줄 하나님이 아심이니라.","explanation":"사탄은 '하나님과 같이 된다'고 유혹했습니다. 인간은 본래 하나님을 주인으로 창조된 존재인지라 창조주의 뜻을 헤아려 선택할 때 행복합니다. 인간이 하나님과 같이 된다는 것은 하나님을 밀어내고 인간 스스로 주인이 되겠다는 것입니다. 하나님이 아닌 '인간 스스로가 주인 되는 것'을 '원죄(The sin)'라 하고, 그로 인해 인간은 살아가면서 수많은 죄(sins)를 짓게 됩니다."},
                {"no":8,"ref":"로마서 6:23","title":"타락의 결과 - 죽음","verse":"죄의 삯은 사망이요 하나님의 은사는 그리스도 예수 우리 주 안에 있는 영생이니라.","explanation":"선악과를 먹은 인간은 하나님을 버리고 자기가 주인된 죄로 인해 죽음에 이르고, 자기의 이익을 위해 죄를 지을 수밖에 없는 존재로 전락합니다. 그러나 예수님이 십자가에서 죄의 값을 치르시고, 부활하셔서 예수님의 신적인 생명을 우리에게 주셔서 영생하게 됩니다. 하나님의 은혜입니다."},
                {"no":9,"ref":"히브리서 9:27","title":"타락의 결과 - 심판 후 지옥","verse":"한번 죽는 것은 사람에게 정해진 것이요 그 후에는 심판이 있으리니.","explanation":"죄의 결과로 사람은 죽은 후에 심판을 받으며 영생과 영벌로 나뉩니다. 기준은 예수님을 마음에 구원자요 주인으로 영접하는가 입니다(롬10:9)."},
                {"no":10,"ref":"누가복음 4:6","title":"타락의 결과 - 땅의 통치권 빼앗김","verse":"이 모든 권위와 그 영광을 내가 네게 주리라. 이것은 내게 넘겨 준 것이므로 내가 원하는 자에게 주노라.","explanation":"광야시험을 받는 예수님에게 사단이 한 말입니다. 선악과 먹은 죄로 인해 하나님이 아담에게 주신 땅의 통치권(창 1:28)이 사단에게 넘어갔습니다. 사도 바울은 사단을 공중 권세 잡은 자(엡2:2), 세상 신(고후4:4)이라고 했습니다."},
                {"no":11,"ref":"요한복음 8:44","title":"타락의 결과 - 마귀 자식이 됨","verse":"너희는 너희 아비 마귀에게서 났으니 너희 아비의 욕심대로 너희도 행하고자 하느니라. 그는 처음부터 살인한자요 진리가 그 속에 없으므로 진리에 서지 못하고 거짓을 말할 때마다 제 것으로 말하나니. 이는 그가 거짓말쟁이요 거짓의 아비가 되었음이라.","explanation":"예수님은 선악과를 먹어 진리(하나님의 기준)가 없는, 자기가 주인된 인간을 마귀의 자식(진노의 자식)이라고 하셨습니다. 하나님의 형상이 깨진 모든 인간은 악한 본성으로 태어나게 되었고, 권위 순서도 하나님->인간->천사->사단에서, 하나님->사단->인간->천사로 바뀌었습니다."},
                {"no":12,"ref":"로마서 3:23","title":"타락의 결과 - 하나님의 영광 X","verse":"모든 사람이 죄를 범하였으매 하나님의 영광에 이르지 못하더니.","explanation":"아담의 후손인 모든 인간은 죄를 지을 수밖에 없는 존재가 되어 사망 권세 아래 있고, 하나님의 형상이 깨어져 하나님의 성품과 능력을 드러낼 수 없고, 하나님의 영광을 나타낼 수 없음을 말합니다."},
                {"no":13,"ref":"창세기 3:22","title":"선악과의 의미와 생명나무","verse":"여호와 하나님이 이르시되 보라 이 사람이 선악을 아는일에 우리 중 하나 같이 되었으니 그가 그의 손을 들어 생명나무 열매도 따 먹고 영생할까 하노라 하시고.","explanation":"선악과를 먹은 후 삼위 하나님께서 '이 사람이 우리 중 하나와 같이 선악을 알게 되었으니'라고 하십니다. 이것은 인간이 하나님이 되었다는 뜻이 아니라, 인간이 선악과를 먹은 후에 원래의 통치 개념인 하나님의 기준이 아닌 인간의 자기 기준으로 선악을 구분하게 되었다는 타락의 증거를 뜻하며, 그 후 선악의 기준이 사람마다 다른 이유를 설명해줍니다. 선악의 기준은 인간에게 있지 않고, 오직 온전히 선하신 하나님에게만 있습니다. 그래서 하나님이 나의 주인이 되셔야 합니다."},
                {"no":14,"ref":"창세기 3:15","title":"원복음","verse":"내가 너로 여자와 원수가 되게 하고 네 후손도 여자의 후손과 원수가 되게 하리니 여자의 후손은 네 머리를 상하게 할 것이요 너는 그의 발꿈치를 상하게 할 것이니라 하시고.","explanation":"아담이 죄를 지은 후 에덴에서 쫓겨나기 전에인간을 구원하실 첫 구원계획(원복음)을 하나님께서 선포하십니다. 뱀의 머리를 상하게 한다는 것은 여자의후손인 예수님께서 십자가와 부활로 사단의 권세를 무력화하심을 말합니다. 사탄이 예수님의 발꿈치를 상하게 한다는 것은 예수님께서 세상 권세(사단)들에 정죄받고 십자가에서 죽으신다는 말씀입니다. 사단이 잠시승리하는 것처럼 보이지만, 예수님의 부활하심으로 하나님의 구원계획을 이루십니다."},
                {"no":15,"ref":"로마서 11:36","title":"주권성","verse":"이는 만물이 주에게서 나오고 주로 말미암고 주에게로 돌아감이라 그에게 영광이 세세에 있을지어다. 아멘","explanation":"하나님`예수님`성령님은 창조자, 통치자, 심판자이십니다. 만물이 주에게서 나오고(창조), 주로 말미암고(통치), 주께 돌아감이라(심판)."},
                {"no":16,"ref":"요한계시록 22:13","title":"영원성","verse":"나는 알파와 오메가요 처음과 마지막이요 시작과 마침이라.","explanation":"(3위)하나님은 만물의 근원이셔서, 모든 창조물에창조의 목적과 의미를 부여하시며, 모든 것의 마침 이셔서 재판장이 되십니다. (3위)하나님은 시간 제약을 받지 않으시는 영원자 이시기에 시간 내에서 일어나는 모든 일을 주관, 결정, 운행, 심판하십니다."},
                {"no":17,"ref":"야고보서 1:17","title":"불변성","verse":"온갖 좋은 은사와 온전한 선물이 다 위로부터 빛들의 아버지께로 부터 내려오나니 그는 변함도 없으시고 회전하는 그림자도 없으시니라.","explanation":"(3위)하나님은 영원하시고, 변하지 않으시며, 다양한 섭리로 역사하셔서, 우리에게 시험과 유혹과 시련을극복할 수 있는 공급이 됩니다."},
                {"no":18,"ref":"요한1서 3:20","title":"전지성","verse":"이는 우리 마음이 혹 우리를 책망할 일이 있어도 하나님은 우리 마음보다 크시고 모든 것을 아시기 때문이라.","explanation":"(3위)하나님은 모든 것을 아시는 지식의 근원이십니다. 전지하신 하나님께는 선하신 계획이 있으시기에 어떤 상황에도 우리는 두려워하지 않을 수 있습니다."},
                {"no":19,"ref":"시편 147:5","title":"전능성","verse":"우리 주는 위대하시며 능력이 많으시며 그의 지혜가 무궁하시도다.","explanation":"(3위)하나님은 만물의 힘을 모두 합한 것보다 더큰 권능이 있으십니다. 그래서 우리는 능력 주시는 그분 안에서 모든 것을 할 수 있습니다."},
                {"no":20,"ref":"예레미아 23:24","title":"편재성","verse":"여호와의 말씀이니라 사람이 내게 보이지 아니하려고 누가 자신을 은밀한 곳에 숨길 수 있겠느냐 여호와가 말하노라 나는 천지에 충만하지 아니하냐.","explanation":"(3위)하나님은 시간과 공간을 초월하여 언제나 어디나 존재하셔서 두렵기도 하지만, 항상 우리와 함께 계시고 동행하시니 우리에게 축복이 됩니다."},
                {"no":21,"ref":"로마서 5:8","title":"사랑","verse":"우리가 아직 죄인 되었을 때에 그리스도께서 우리를 위하여 죽으심으로 하나님께서 우리에 대한 자기의 사랑을 확증하셨느니라.","explanation":"공의로우신 하나님은 죄인을 심판을 하셔야 하지만, 인간을 사랑하시기에 인간이 받을 저주를 그 분의 아들 예수님께 내리셔서 우리의 죄값을 치르게 하셨습니다. 하나님의 사랑은 십자가의 사랑입니다."},
                {"no":22,"ref":"디도서 1:2","title":"성실","verse":"영생의 소망을 위함이라 이 영생은 거짓이 없으신 하나님이 영원 전부터 약속하신 것인데.","explanation":"거짓이 없으신 하나님은 신적 생명으로서의 영생을 우리에게 약속하셨고, 예수님은 그 약속을 신실하게 이행하셨습니다."},
                {"no":23,"ref":"신명기 32:4","title":"의","verse":"그는 반석이시니 그가 하신 일이 완전하고 그의 모든 길이 정의롭고 진실하고 거짓이 없으신 하나님이시니 공의로우시고 바르시도다.","explanation":"(3위)하나님은 완전하고 의로우신 분입니다. 우리도 예수 그리스도의 ‘의’를 덧입어 그 의가 드러나는 삶을 살아야 합니다. 이것은 개인의 노력으로 되는 것이 아니고, ‘십자가 연합’을 통하여 그리스도가 내 삶으로 나타나는 것입니다."},
                {"no":24,"ref":"로마서 1:18~19","title":"공의","verse":"하나님의 진노가 불의로 진리를 막는 사람들의 모든 경건하지 않음과 불의에 대하여 하늘로부터 나타나나니 이는 하나님을 알 만한 것이 그들 속에 보임이라 하나님께서 이를 그들에게 보이셨느니라.","explanation":"(3위)하나님은 공명정대한 심판자 이십니다. 하나님은 만물과 모든 사람들의 마음 속에 그 분의 존재를 알 수 있는 것을 심어 놓으셨습니다. 그러므로 우리는 하나님을 몰랐다고 변명하거나 핑계를 댈 수 없습니다."},
                {"no":25,"ref":"히브리서 7:21","title":"성부가 성자에게","verse":"그들은 맹세 없이 제사장이 되었으되 오직 예수는 자기에게 말씀하신 이로 말미암아 맹세로 되신 것이라 주께서 맹세하시고 뉘우치지 아니하시리니 네가 영원히 제사장이라 하셨도다.","explanation":"예수님이 제사장이 되신 것은 법과 제도에 따른것이 아니라, 인간을 구원하고자 예수님을 이 땅에 보내시려는 성부 하나님의 맹세로 제사장이 되셨습니다.예수님의 죽음 사역은 하나님의 뜻에 따른 순종입니다. (천국은 성부, 성자, 성령님께서 계신 곳이고 세 분의 통치가 이루어 지는 곳입니다. 지옥은 재림(심판의 날)에 사단을 보내려 만든 곳인데, 예수 믿지 않는 사람도 같이 가게 됩니다.)"},
                {"no":26,"ref":"요한복음 3:16","title":"구원","verse":"하나님이 세상을 이처럼 사랑하사 독생자를 주셨으니 이는 그를 믿는 자마다 멸망하지 않고 영생을 얻게 하려 하심이라.","explanation":"하나님이(구원의 주체), 세상을(구원의 대상), 이처럼 사랑하사(구원의 이유와 크기), 독생자를 주셨으니(하나님 편에서의 구원의 방법), 이는 저를 믿는 자 마다(인간 편에서의 구원의 방법), 멸망치 않고 영생을 얻게 하려 하심이라(구원의 목적). 구원의 주인도, 인생의 주인도 하나님이십니다."},
                {"no":27,"ref":"로마서 10:9","title":"구원 받을 믿음","verse":"네가 만일 네 입으로 예수를 주로 시인하며 또 하나님께서 그를 죽은 자 가운데서 살리신 것을 네 마음에 믿으면 구원을 받으리라.","explanation":"구원 받을 믿음이란 예수님을 구원자(죽은 자 가운데서 살리신 것)와 주님(主)으로 영접하여 믿음으로 얻는 구원을 말합니다. 주님이란 ‘주인<군주<창조주<야훼’’로서 예수님이 ‘나의 주인<나라의 주인<피조세계의 주인<하나님’이라는 뜻입니다."},
                {"no":28,"ref":"요한복음 3:17","title":"초림 이유","verse":"하나님이 그 아들을 세상에 보내신 것은 세상을 심판하려 하심이 아니요 그로 말미암아 세상이 구원을 받게하려 하심이라.","explanation":"언약의 실체이신 예수님께서 초림하신 이유는 인류에게 구원의 문을 여시기 위함입니다. 믿는 자에게는 구원이, 믿지 않는 자에게는 심판이 임하는데, 하나님은 우리가 구원받기를 바라십니다."},
                {"no":29,"ref":"히브리서 4:15","title":"초림 - 인성과 신성","verse":"우리에게 있는 대제사장은 우리의 연약함을 동정하지못하실 이가 아니요 모든 일에 우리와 똑같이 시험을 받으신 이로되 죄는 없으시니라.","explanation":"대속자는 인간의 죄를 대신하기 위해서 인간(인성)이어야 하고, 인간의 죄를 대속하기 위해서는 죄가없어야(신성) 했습니다.우리의 연약함을 아시는 예수님은 우리와 똑같이 태어나 자라고 시험을 받으셨지만(인성), 우리와는 다르게 죄가 없으셨습니다(신성).예수님은 대속자로서의 두 조건(인성과 신성)을 갖추셨습니다."},
                {"no":30,"ref":"이사야 9:6","title":"성육신 예언","verse":"이는 한 아기가 우리에게 났고 한 아들을 우리에게 주신 바 되었는데 그의 어깨에는 정사를 메었고 그의 이름은 기묘자라, 모사라, 전능하신 하나님이라, 영존하시는 아버지라, 평강의 왕이라 할 것임이라.","explanation":"예수 그리스도께서 인간의 모습으로 출생할 것을 예언합니다. 그러나 그 이름은 유대인들이 유일하신 하나님에게만 붙였던 5가지를 사용합니다. 예수님은 인간으로 오신 성자 하나님입니다."},
                {"no":31,"ref":"이사야 61:1~3","title":"메시아 예언","verse":"주 여호와의 영이 내게 내리셨으니 이는 여호와께서 내게 기름을 부으사 가난한 자에게 아름다운 소식을 전하게 하려 하심이라 나를 보내사 마음이 상한 자를 고치며 포로된 자에게 자유를, 갇힌 자에게 놓임을 선포하며 여호와의 은혜의 해와 우리 하나님의 보복의 날을 선포하여 모든 슬픈 자를 위로하되 무릇 시온에서 슬퍼하는 자에게 화관을 주어 그 재를 대신하며 기쁨의 기름으로 그 슬픔을 대신하며 찬송의 옷으로 그 근심을 대신하시고 그들이 의의 나무 곧 여호와께서 심으신 그 영광을 나타낼 자라 일컬음을 받게 하려 하심이라.","explanation":"하나님께서 기름부으신 메시아가 오셔서 하실 일을 이사야가 기록합니다. 예수님의 목적과 소명을 구약의 메시아 예언을 통해 선포하셨습니다."},
                {"no":32,"ref":"마태복음 11:4~6","title":"메시아 선언","verse":"예수께서 대답하여 이르시되 너희가 가서 듣고 보는 것을 요한에게 알리되 맹인이 보며 못 걷는 사람이 걸으며 나병환자가 깨끗함을 받으며 못 듣는 자가 들으며 죽은 자가 살아나며 가난한 자에게 복음이 전파된다 하라 누구든지 나로 말미암아 실족하지 아니하는 자는 복이 있도다 하시니라.","explanation":"요한이 옥에서 그리스도께서 하신 일을 듣고 제자들을 보내어 오실 이가 당신이시냐고 묻습니다. 이에 예수님은 자신이 이 땅에 오신 목적과 소명을 구약의 메시아 예언을 선언하심으로 천명합니다. 예수님은 하나님께서 약속한 구원자(메시아)입니다."},
                {"no":33,"ref":"마태복음 4:23","title":"예수님의 3중 사역","verse":"예수께서 온 갈릴리에 두루 다니사 그들의 회당에서 가르치시며 천국 복음을 전파하시며 백성 중의 모든 병과 모든 약한 것을 고치시니.","explanation":"예수님은 가르치시고, 천국복음을 선포하시고, 고치셨습니다(예수님의 3중 사역). 가르침(Teaching)은 하나님의 기준으로 지식 체계를 바꿔주는 것이고, 천국복음선포(Preaching)는 가슴에 불을 넣어 주어 회개, 결단, 도전, 헌신하여 복음을 전파하게 하는 것이고, 고치심(Healing)은 천국 복음이 선포될 때 일어나는 영혼육의 회복(귀신이 떠나고, 과거가 재해석되어 마음의 감옥에서 해방되어 소망이 생기며, 육신적 질병이 치유)을 말합니다."},
                {"no":34,"ref":"이사야 53:5~6","title":"십자가 예언","verse":"그가 찔림은 우리의 허물 때문이요 그가 상함은 우리의 죄악 때문이라 그가 징계를 받으므로 우리는 평화를 누리고 그가 채찍에 맞으므로 우리는 나음을 받았도다. 우리는 다 양 같아서 그릇 행하여 각기 제 길로 갔거늘 여호와께서는 우리 모두의 죄악을 그에게 담당시키셨도다.","explanation":"예수님의 죽음이 대속의 죽음임을 나타내시는 십자가의 예언입니다."},
                {"no":35,"ref":"골로새서 2:13~15","title":"십자가에서 멸하신 4가지","verse":"또 범죄와 육체의 무할례로 죽었던 너희를 하나님이 그와 함께 살리시고 우리의 모든 죄를 사하시고 우리를 거스르고 불리하게 하는 법조문으로 쓴 증서를 지우시고 제하여 버리사 십자가에 못 박으시고 통치자들과 권세들을 무력화하여 드러내어 구경거리로 삼으시고 십자가로 그들을 이기셨느니라.","explanation":"예수님께서 그리스도 안에 있는 사람들에게 주신, 십자가에서 멸하신 4가지는 ①사망(13절, 범죄와 육체의 무할례로 죽었던 우리를 살리심은 사망을 멸하심) ②모든 죄(13절, 원죄와 자범죄) 원죄는 하나님께 사죄를, 자범죄는 대상자인 사람에게 사죄를 해야 합니다. ③죄와 형벌 기록(14절, 우리를 불리하게 하는 법조문, 빚 문서 즉, 사단이 송사할 우리 죄의 기록과 형벌 기록을 십자가에 못 박아 없애셔서 정죄감과 수치와 죄책감에서 해방) ④사단의 권세(15절, 권력들과 권세들을 무장해제 하셔서, 사단의 세력과, 사회 구조적인 악과 개인의 중독에서 해방)"},
                {"no":36,"ref":"마가복음 10:45","title":"대속","verse":"인자가 온 것은 섬김을 받으려 함이 아니라 도리어 섬기려 하고 자기 목숨을 많은 사람의 대속물로 주려 함이니라.","explanation":"제사용어로서 대속이란, 죄인 대신 흠없는 동물을 죽여 죄인이 용서받는 것이고, (노예)시장용어로서 대속(속량)이란, 노예를 자유케 하고자 대신 값을 지불하는 것입니다. 이처럼 대속물이신 예수 그리스도의 죽음은 십자가 위에서의 제사였고, 우리 죄에 대한 몸값을 치른 속량 이었습니다"},
                {"no":37,"ref":"신명기 21:23","title":"속량","verse":"그 시체를 나무 위에 밤새도록 두지 말고 그 날에 장사하여 네 하나님 여호와께서 네게 기업으로 주시는 땅을 더럽히지 말라 나무에 달린 자는 하나님께 저주를 받았음이니라.&#10;&#10;갈라디아서 3:13 (속량)&#10;그리스도께서 우리를 위하여 저주를 받은 바 되사 율법의 저주에서 우리를 속량하셨으니 기록된 바 나무에 달린 자마다 저주 아래에 있는자라 하였음이라.","explanation":"성경에서 나무에 달려 죽은 자는 하나님의 저주를 받은 사람입니다. 하나님께서는 인간이 받아야 할 모든 저주를 예수님께 얹으셔서 처형하셨습니다. 죄의 노예 된 우리의 대가를 예수께서 지불하셔서(속량), 우리를 죄와 사단과 율법과 죽음의 노예 상태에서 해방시키셨습니다. 이제는 자유입니다. &#10;&#10;예수님께서는 “모세가 놋뱀을 든 것 같이 인자도 들려야 하리라(요3:14)”고 하셨습니다. 십자가는 예수님께서 모든 인간이 받을 저주를 대신 받으시고 죽으신 장소입니다. 예수님을 믿겠다고 고백하는 세례는, 예수님께서 인간의 모든 뱀들을 처리하시기 위해 못 박히신 십자가에서 우리의 옛 자아인 뱀을 죽음으로 처리하겠다는 결단식입니다."},
                {"no":38,"ref":"레위기 17:11","title":"죄사함","verse":"육체의 생명은 피에 있음이라 내가 이 피를 너희에게 주어 제단에 뿌려 너희의 생명을 위하여 속죄하게 하였나니 생명이 피에 있으므로 피가 죄를 속하느니라.&#10;&#10;히브리서 9:22 (죄사함)&#10;율법을 따라 거의 모든 물건이 피로써 정결하게 되나니피 흘림이 없은즉 사함이 없느니라.","explanation":"피는 존재를 담고 있습니다. 대속 받기 위해 다른 피(존재)를 드립니다. 제사의 핵심은 피의 교환입니다. &#10;옛 언약의 제사는 예수님의 피 흘리심을 통해 옛 아담의 존재인 우리를 예수님의 존재로 바꾸시는 것을 예표합니다. 예수님이 피를 흘리셔서 우리는 죄사함을 받을 뿐 아니라, 예수님의 신적 생명(Zoe)으로 교환되어 새로운 피조물이 되었습니다. &#10;예수님이 우리 대신 피를 흘리셔서 우리 죄를 용서받았습니다. 그 피는 사람의 피가 아니라 하나님의 존재를 담고 있는 피이기에 썩지도 않고 영원하며, 부정한 것을 정결하게 하는 거룩한 피입니다. 2,000년 전에 흘리신 그 피는 눈에 보이지 않지만, 그 피의 효력과 공로와 은총을 믿는 사람에게 역사하십니다. 그래서 새언약의 일꾼은 예수님의 십자가의 보혈을 선포하는 사람입니다."},
                {"no":39,"ref":"로마서 1:18~19","title":"공의와 사랑","verse":"하나님의 진노가 불의로 진리를 막는 사람들의 모든 경건하지 않음과 불의에 대하여 하늘로부터 나타나나니 이는 하나님을 알 만한 것이 그들 속에 보임이라 하나님께서 이를 그들에게 보이셨느니라.&#10;&#10;로마서 5:8 (공의와 사랑)&#10;우리가 아직 죄인 되었을 때에 그리스도께서 우리를 위하여 죽으심으로 하나님께서 우리에 대한 자기의 사랑을 확증하셨느니라.","explanation":"십자가는 공의(롬1:18-19)와 사랑(롬5:8)의 만남입니다. 하나님은 죄가 있는 인간을 죄의 삯인 사망 없이용서하실 수 없는 공의의 하나님이십니다. 그러나 인간을 사랑하시는 사랑의 하나님이십니다. 그래서 십자가에서 자신의 독생자 예수님을 죄의 대가로 죽이셔서 공의를 실현하시고, 인간을 구원해 주시어 인간에 대한사랑을 보여주셨습니다. 십자가에는 대속의 고민을 하신 하나님의 성품이 담겨있습니다."},
                {"no":40,"ref":"골로새서 1:20","title":"화평","verse":"그의 십자가의 피로 화평을 이루사 만물 곧 땅에 있는것들이나 하늘에 있는 것들이 그로 말미암아 자기와 화목하게 되기를 기뻐하심이라.","explanation":"예수님의 십자가의 피는 하나님과 사람, 사람과 사람, 자연과 사람의 관계를 화목하게 하셨습니다. 보혈의 사람은 화평케 하는 사람입니다."},
                {"no":41,"ref":"로마서 5:10","title":"화평","verse":"곧 우리가 원수 되었을 때에 그의 아들의 죽으심으로 말미암아 하나님과 화목하게 되었은즉 화목하게 된 자로서는 더욱 그의 살아나심으로 말미암아 구원을 받을 것이니라.","explanation":"내가 주인 되어 사는 삶은 하나님과 원수 관계입니다. 그러나 예수님의 십자가로 하나님과 화목이 시작되었고, 부활로 더욱 화목하게 된다는 말씀입니다. 부활은 화목(성화)을 이루는 강력한 은혜입니다. 부활하신 예수님이 주인 되시는 성화의 삶은 하나님과 더욱 연합(구원)된다는 뜻입니다."},
                {"no":42,"ref":"에베소서 2:13~14","title":"화평","verse":"이제는 전에 멀리 있던 너희가 그리스도 예수 안에서 그리스도의 피로 가까워졌느니라. 그는 우리의 화평이신지라 둘로 하나를 만드사 원수 된 것 곧 중간에 막힌담을 자기 육체로 허시고.","explanation":"화평이란 소외감이나 적대감이 없는 올바른 관계입니다. 예수님의 피로서 이방인이 하나님과 유대인과 화평하게 되었습니다. 예수님 안에 있으면 누구라도 소외감과 적대감을 이기고 화평을 선택 할 수 있습니다."},
                {"no":43,"ref":"고린도후서 5:17~18","title":"화평","verse":"그런즉 누구든지 그리스도 안에 있으면 새로운 피조물이라 이전 것은 지나갔으니 보라 새 것이 되었도다. 모든 것이 하나님께로서 났으며 그가 그리스도로 말미암아 우리를 자기와 화목하게 하시고 또 우리에게 화목하게 하는 직분을 주셨으니.","explanation":"예수님을 영접한 사람은 새로운 피조물이며, 과거도, 현재도, 미래도 새로운 출발을 하게 됩니다. 거듭남(Born again)이란 Born anew(새로운 존재로 태어남)이기 때문입니다. 그래서 우리는 첫 아담의 분열적 존재에서 둘째 아담인 예수님의 화평적 존재로 변화되었고, 하나님과 사람, 사람과 사람을 예수님의 샬롬으로 연결하는 직분을 받았습니다."},
                {"no":44,"ref":"시편 16:10","title":"다윗의 부활 예언","verse":"주께서 내 영혼을 스올에 버리지 아니하시며 주의 거룩한 자를 멸망시키지 않으실 것임이니이다.","explanation":"부활도 십자가와 마찬가지로 우연한 일이 아니라 하나님의 계획입니다. B.C 1,000년 전에 다윗이 예수님의 부활을 예언했습니다. 베드로(행2:27)와 바울(행13:34)이 설교할 때 다윗의 부활 예언을 인용했습니다"},
                {"no":45,"ref":"마태복음 16:21","title":"예수님의 부활 예언","verse":"예수 그리스도께서 자기가 고난을 받고 죽임을 당하고 제 삼일에 살아나야 할 것을 제자들에게 비로소 나타내시니.","explanation":"예수님은 어쩌다 죽고, 어쩌다 부활한 것이 아니라, 구약에 약속된 메시아의 핵심 사역이었습니다. 베드로의 신앙고백(마16:16) 후 제자들에게 예수님은 자신의죽음과 부활을 직접 예언하셨습니다. 메시아의 시간을계산하고 계시는 예수님입니다."},
                {"no":46,"ref":"고린도전서 15:3~4","title":"부활 성취","verse":"성경대로 그리스도께서 우리 죄를 위하여 죽으시고 장사 지낸 바 되셨다가 성경대로 사흘 만에 다시 살아나사.","explanation":"예수님의 죽음과 부활은 역사적 사실입니다. 세상의 역사는 지나온 과거를 기록하지만, 성경의 역사는 예언으로 미리 기록하고, 그대로 이루어진 성취를 확인 시켜주고 기록합니다. 중요한 것은 성경입니다. 예수님은 성경대로 죽으시고, 성경대로 부활하셨습니다. 그래서 성경대로 믿는 것이 중요합니다."},
                {"no":47,"ref":"고린도전서 15:5~8","title":"부활 증인","verse":"게바에게 보이시고 후에 열두 제자에게와 그 후에 오백여 형제에게 일시에 보이셨나니 그 중에 지금까지 대다수는 살아 있고 어떤 사람은 잠들었으며 그 후에 야고보에게 보이셨으며 그 후에 모든 사도에게와 맨 나중에 만삭되지 못하여 난 자 같은 내게도 보이셨느니라.","explanation":"예수님의 부활을 부인하는 기절설과 도난설이 있습니다. 그러나 예수님의 부활에는 수많은 증인들과 기록이 있습니다. 일반 역사도 증인과 기록을 통해서 믿듯이, 예수님의 부활도 역사적 사실로 믿어야 합니다. 또한 부활의 증인들은 목숨의 위협에도 증언을 취소하지 않고 박해와 순교로 삶을 마감합니다. 무엇을 보았기에 그런 삶을 살까요? 죽었다가 살아난 사람을 보았기 때문입니다. 예수님은 하나님입니다"},
                {"no":48,"ref":"로마서 1:4","title":"예수님은 성자 하나님","verse":"성결의 영으로는 죽은 자들 가운데서 부활하사 능력으로 하나님의 아들로 선포되셨으니 곧 우리 주 예수 그리스도시니라.","explanation":"부활이 없었다면 예수님의 죽음이 대속의 죽음임을 확인할 길이 없습니다. 부활이 알려주는 사실은, 신성모독으로 십자가에서 죽은 청년 예수가 성자 하나님이 맞았고, 그 죽음이 우리 죄를 위한 대속의 죽음이 맞았다는 것을 사도 바울이 선언합니다. 부활은 예수님이 하나님이라는 유일한 표적입니다."},
                {"no":49,"ref":"로마서 6:4","title":"새 생명 찾아옴","verse":"우리가 그의 죽으심과 합하여 세례를 받음으로 그와 함께 장사 되었나니 이는 아버지의 영광으로 말미암아 그리스도를 죽은 자 가운데서 살리심과 같이 우리로 또한 새 생명 가운데서 행하게 하려 함이라.","explanation":"예수님의 부활의 목적은 우리가 예수님의 새생명의 존재로 사는 것입니다. 생명에는 2가지가 있습니다. Zoe(예수님의 신적`영적 생명), Bios(인간의 생물학적`자연적 생명) 입니다. 예수님을 영접하면, 부활로 주신 예수님의 신적 생명(Zoe)과 생물학적(Bios) 생명이 우리 안에 공존합니다. 자기부인으로 내가 작아지고 예수님이 나를 점유하시면, 예수님의 신적 생명의 성품과 능력이 나를 통해 나타나게 됩니다."},
                {"no":50,"ref":"마태복음 28:18","title":"하늘과 땅의 통치권 주심","verse":"예수께서 나아와 말씀하여 이르시되 하늘과 땅의 모든권세를 내게 주셨으니.","explanation":"예수님은 아담이 빼앗겼던 땅의 통치권을 십자가에서 무력화하셔서(골2:15) 땅의 통치권 되찾고, 하늘의 통치권까지 우리에게 주시며 복음 전파의 사명을 주셨습니다. 부활로 인해 우리는 사명과 사명을 수행할 권세를 위임 받았습니다. 권위 순서도 하나님->인간(엡2:6)->천사->사단으로 바뀌게 됩니다."},
                {"no":51,"ref":"누가복음 24:44~48","title":"부활 후 40일간 하신 일","verse":"또 이르시되 내가 너희와 함께 있을 때에 너희에게 말한 바 곧 모세의 율법과 선지자의 글과 시편에 나를 가리켜 기록된 모든 것이 이루어져야 하리라 한 말이 이것이라 하시고 이에 그들의 마음을 열어 성경을 깨닫게하시고 또 이르시되 이같이 그리스도가 고난을 받고 제삼일에 죽은 자 가운데서 살아날 것과 또 그의 이름으로 죄 사함을 받게 하는 회개가 예루살렘에서 시작하여 모든 족속에게 전파될 것이 기록되었으니 너희는 이 모든 일의 증인이라.","explanation":"예수님은 부활 후 40일간 2가지에 중점을 두고 지상사역을 하십니다.&#10;첫째는 제자들에게 구약 성경 속에서 예수님 자신에 관한 예언을 설명해 주시고 깨닫게 하시는 일이었습니다. 공생애 동안 제자들은 예수님께서 십자가에 죽으시고 부활하실 것을 여러 번 들었지만 깨닫지 못했습니다. 그러나 제자들은 “죽은 자 가운데서 살아나신 후에야 성경과 예수님의 말씀을 믿었더라(요2:22).”고 기록됩니다. 부활은 성경의 모든 말씀을 하나님 말씀으로 믿게 하는 결정적인 사건입니다. &#10;둘째는 증인 되어 전파할 내용 3가지를 알려주십니다. 십자가와 부활과 원죄를 용서받는 회개를 해야 한다는 것입니다."},
                {"no":52,"ref":"고린도전서 15:20","title":"부활의 첫 열매","verse":"그리스도께서 죽은 자 가운데서 다시 살아나사 잠자는 자들의 첫 열매가 되셨도다.","explanation":"하나님은 선악과 먹고 하나님처럼 되고자 했던 첫째 아담을 고쳐서 교제할 수 없다는 것을 아시고 죽이기로 결정하셨습니다. 둘째 아담 예수님은 첫째 아담의 죄를 지시고 십자가에서 죽으셨지만, 하나님과 영원히 교제할 수 있는 존재로 새롭게 살아나셨습니다. 예수님을 영접한 사람은 죽음 이후에도 하나님과 영원한 교제를 할 수 있게 되었습니다."},
                {"no":53,"ref":"고린도전서 15:44","title":"영의 몸의 부활","verse":"육의 몸으로 심고 신령한 몸으로 다시 살아나나니 육의 몸이 있은즉 또 영의 몸도 있느니라.","explanation":"부활의 몸은 전혀 새로운 몸입니다. 부활하신 예수님의 몸은 닫힌 문을 통과하여 제자들에게 나타나셨고, 제자들은 영(귀신)인가 했지만, 예수님은 귀신과 다르게 살과 뼈가 있어 만질 수 있었고, 음식도 드셨습니다(눅24:36-43). 예수님의 재림 때 믿는 자는 영의 몸으로 부활하게 됩니다."},
                {"no":54,"ref":"에베소서 1:21~23","title":"승천 후 보좌 통치","verse":"모든 통치와 권세와 능력과 주권과 이 세상뿐 아니라오는 세상에 일컫는 모든 이름 위에 뛰어나게 하시고또 만물을 그의 발 아래에 복종하게 하시고 그를 만물위에 교회의 머리로 삼으셨느니라 교회는 그의 몸이니만물 안에서 만물을 충만하게 하시는 이의 충만함이니라.","explanation":"부활하신 예수님은 하나님의 보좌 우편인 통치권자의 자리에 앉으셔서 만물(역사)과 교회를 다스리십니다."},
                {"no":55,"ref":"요한복음 15:26","title":"성령 파송","verse":"내가 아버지께로부터 너희에게 보낼 보혜사 곧 아버지께로부터 나오시는 진리의 성령이 오실 때에 그가 나를증언하실 것이요.","explanation":"예수님은 승천 후 성령님(보혜사)을 보내셔서 예수님을 증언하게 하셨습니다. 성령님은 예수님을 증언하시는 분입니다."},
                {"no":56,"ref":"요한복음 16:7","title":"성령 파송","verse":"그러나 내가 너희에게 실상을 말하노니 내가 떠나는 것이 너희에게 유익이라 내가 떠나가지 아니하면 보혜사가 너희에게로 오시지 아니할 것이요 가면 내가 그를너희에게로 보내리니.","explanation":"예수님의 승천은 성령 파송의 조건이었습니다.예수님이 떠나셔야 보혜사 성령님이 오십니다. 성령 파송은 믿는 자에게 큰 유익입니다."},
                {"no":57,"ref":"누가복음 24:49","title":"성령 파송","verse":"볼지어다 내가 내 아버지께서 약속하신 것을 너희에게보내리니 너희는 위로부터 능력으로 입혀질 때까지 이성에 머물라 하시니라.","explanation":"성령님은 생명을 구원할 능력을 우리에게 주십니다. 예수님이 십자가에서 죽으시고 부활 하셨어도 믿는 모든 사람이 능력을 입을 수 없습니다. 그러나 예수님의 승천으로 임무교대하신 예수님의 영(성령)으로 인해 제자들 뿐 아니라. 우리도 예수님의 권능을 받고, 증인이 됩니다."},
                {"no":58,"ref":"로마서 8:15~17","title":"관계 회복","verse":"너희는 다시 무서워하는 종의 영을 받지 아니하고 양자의 영을 받았으므로 우리가 아빠 아버지라고 부르짖느니라 성령이 친히 우리의 영과 더불어 우리가 하나님의자녀인 것을 증언하시나니 자녀이면 또한 상속자 곧 하나님의 상속자요 그리스도와 함께 한 상속자니 우리가그와 함께 영광을 받기 위하여 고난도 함께 받아야 할것이니라.","explanation":"예수님을 구원자와 주인으로 영접할 때(롬10:9)그리스도의 영(양자의 영)이 내주하시어 신분의 변화가생깁니다. 죄의 종에서 하나님의 자녀가 되는 관계회복이 일어납니다. 또한 신분의 변화로 권세의 변화도 생깁니다. 믿는 자는 하나님의 아들이신 예수님과 공동상속자로서 하나님의 모든 것을 상속받은 법정적 상속자가 됩니다. 법정적 상속권은 예수님의 삶을 살 때 실제적 상속권으로 풀어집니다."},
                {"no":59,"ref":"갈라디아서 5:22-23","title":"성품 회복","verse":"오직 성령의 열매는 사랑과 희락과 화평과 오래참음과자비와 양선과 충성과 온유와 절제니 이같은 것을 금지할 법이 없느니라.","explanation":"성령(예수의 영)이 우리 영에 임하면 우리 영안에 예수님의 성품과 능력이 심겨집니다. 이제 우리는예수님을 성품을 나타낼 수 있는 존재가 되었습니다.옛사람의 자기중심적인 성품대로 살지 않아도 됩니다.자유의지로 선택하여 예수님의 성품의 열매를 맺어 갑니다."},
                {"no":60,"ref":"에베소서 2:6","title":"권세 회복","verse":"또 함께 일으키사 그리스도 예수 안에서 함께 하늘에앉히시니.","explanation":"예수님은 승천하셔서 하나님의 보좌우편에 앉으셔서 만물(역사)과 교회를 다스리십니다(엡1:21-23). 옛사람을 십자가에 못박고, 예수님의 부활생명(Zoe)을 입은 사람은 하나님 보좌우편의 통치자의 자리에 예수님과 함께 앉혀졌습니다. 아담은 땅의 위임통치자(창1:28)였지만, 선악과 사건으로 통치권을 사단에게 빼앗겼습니다(눅4:6).그러나 예수님은 부활과 승천으로 하늘과 땅의 모든 권세를 받으셨고(마28:18), 예수님과 연합한 믿는 자에게도 그 권세를 회복해 주셨습니다.예수님이 주인이신 믿는 자는 예수님의 권세를 사용해사단과 죄와 사망과 세상을 이길 수 있습니다(눅10:19).참고)누가복음 10:19내가 너희에게 뱀과 전갈을 밟으며 원수의 모든 능력을제어할 권능을 주었으니 너희를 해할 자가 결코 없으리라."},
                {"no":61,"ref":"요한복음 14:12","title":"권세 회복","verse":"내가 진실로 진실로 너희에게 이르노니 나를 믿는 자는내가 하는 일을 그도 할 것이요 또한 그보다 큰 일도하리니 이는 내가 아버지께로 감이라.","explanation":"예수님을 믿는 자는 예수님이 하신 일을 할 수 있고, 더 큰 일도 할 수 있습니다. 이는 예수님이 승천하셔서 성령님을 보내시기 때문입니다. 성령의 권능으로 우리는 예수님의 사역을 감당합니다."},
                {"no":62,"ref":"사도행전 17:31","title":"재림","verse":"이는 정하신 사람으로 하여금 천하를 공의로 심판할 날을 작정하시고 이에 그를 죽은 자 가운데서 다시 살리신 것으로 모든 사람에게 믿을 만한 증거를 주셨음이라하니라.","explanation":"예수님은 다시 오셔서 세상을 심판하십니다.부활은 심판주 되심의 증거입니다."},
                {"no":63,"ref":"요한계시록 14:7","title":"심판","verse":"그가 큰 음성으로 이르되 하나님을 두려워하며 그에게영광을 돌리라 이는 그의 심판의 시간이 이르렀음이니하늘과 땅과 바다와 물들의 근원을 만드신 이를 경배하라 하더라.","explanation":"심판의 때가 옵니다. 창조주 하나님을 경배하고영광 돌려야 합니다. 심판은 창조주께 돌아가는 일입니다."},
                {"no":64,"ref":"요한복음 16:9","title":"죄란 예수님을 믿지 않고 내가 주인 된 것","verse":"죄에 대하여라 함은 그들이 나를 믿지 아니함이요.","explanation":"죄의 본질은 예수님을 믿지 않는 것입니다.즉, 예수님을 주인으로 믿지 않고 내가 주인 되어 사는것이 죄입니다."},
                {"no":65,"ref":"사도행전 2:36","title":"성령 파송의 목적","verse":"그런즉 이스라엘 온 집은 확실히 알지니 너희가 십자가에 못 박은 이 예수를 하나님이 주와 그리스도가 되게하셨느니라 하니라.","explanation":"성령님이 오셔서 하시는 일은 예수님이 '주(주인)와 그리스도(구원자)'이심을 확실히 알게 하시는 것입니다."},
                {"no":66,"ref":"사도행전 2:38","title":"회개란 내가 주인 된 것을 회개","verse":"베드로가 이르되 너희가 회개하여 각각 예수 그리스도의 이름으로 세례를 받고 죄 사함을 받으라 그리하면성령의 선물을 받으리니.","explanation":"회개는 단순히 잘못을 뉘우치는 것이 아니라,'내가 주인 된 것'을 회개하고 예수님을 주인으로 영접하는 것입니다. 회개와 세례는 연결되어 있고, 죄 사함과성령의 선물을 받게 됩니다."},
                {"no":67,"ref":"갈라디아서 2:20","title":"세례 의미와 예수 믿는 삶","verse":"내가 그리스도와 함께 십자가에 못 박혔나니 그런즉 이제는 내가 사는 것이 아니요 오직 내 안에 그리스도께서 사시는 것이라 이제 내가 육체 가운데 사는 것은 나를 사랑하사 나를 위하여 자기 자신을 버리신 하나님의아들을 믿는 믿음 안에서 사는 것이라.","explanation":"세례는 옛사람(내가 주인 된 자아)이 십자가에 못박혀 죽었다는 고백이며, 이제는 내 안에 그리스도께서사시고 그 믿음으로 사는 삶을 의미합니다."},
                {"no":68,"ref":"고린도전서 12:3","title":"성령의 내주","verse":"그러므로 내가 너희에게 알리노니 하나님의 영으로 말하는 자는 누구든지 예수를 저주할 자라 하지 아니하고또 성령으로 아니하고는 누구든지 예수를 주시라 할 수없느니라.","explanation":"예수님을 주인으로 고백하게 하시는 분이 성령님입니다. 성령님이 내주하시면 예수님을 주로 고백합니다."},
                {"no":69,"ref":"사도행전 5:32","title":"순종하는 자에게 주시는 성령","verse":"우리는 이 일에 증인이요 하나님이 자기를 순종하는 사람들에게 주신 성령도 그러하니라 하더라.","explanation":"성령님은 순종하는 자에게 주십니다.성령 충만은 순종과 연결됩니다."},

// ===== UTC 기준 날짜 계산 (Safari 안정화)
function toUtcDayNumber(str){
  const [y,m,d]=str.split("-").map(Number);
  return Math.floor(Date.UTC(y,m-1,d)/86400000);
}
function todayISO(){
  const d=new Date();
  return d.toISOString().slice(0,10);
}

const DEFAULT_START="2026-02-08";
const STORAGE_START="memorization_start_v4";

const startInput=document.getElementById("startDate");
const targetInput=document.getElementById("targetDate");
const resultArea=document.getElementById("resultArea");
const statusBox=document.getElementById("statusBox");

function render(){
  const start=startInput.value;
  const target=targetInput.value;
  if(!start||!target)return;

  localStorage.setItem(STORAGE_START,start);

  if(!VERSES.length){
    resultArea.innerHTML="암송 데이터가 없습니다.";
    return;
  }

  const diff=toUtcDayNumber(target)-toUtcDayNumber(start);
  const no=diff+1;

  if(no<1||no>86){
    resultArea.innerHTML="범위를 벗어난 날짜입니다.";
    statusBox.textContent="";
    return;
  }

  const v=VERSES[no-1];

  resultArea.innerHTML=`
    <div class="badge">암송 ${v.no} / 86</div>
    <div class="title">${v.ref} (${v.title})</div>
    <div class="meta">시작일 ${start} · 조회일 ${target}</div>

    <div class="sectionTitle">[암송]</div>
    <div class="verseBox">${v.verse}</div>

    <div class="sectionTitle">[해설]</div>
    <div class="explainBox">${v.explanation}</div>
  `;

  statusBox.textContent=`${target===todayISO()?"오늘":""} 암송 ${v.no} (${diff}일째)`;
}

document.getElementById("btnToday").onclick=()=>{
  targetInput.value=todayISO();
  render();
};
document.getElementById("btnShow").onclick=render;

startInput.onchange=render;
targetInput.onchange=render;

function init(){
  startInput.value=localStorage.getItem(STORAGE_START)||DEFAULT_START;
  targetInput.value=todayISO();
  render();
}
init();
</script>
