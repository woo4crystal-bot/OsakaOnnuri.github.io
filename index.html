<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="color-scheme" content="light"/>
<title>오늘의 성경암송|今日の暗唱聖句</title>

<style>
:root{
  --bg:#f4f8ff;
  --card:#ffffff;
  --primary:#2f6fed;
  --primary-soft:#eaf1ff;
  --text:#1c2433;
  --muted:#6b768a;
  --border:#e3eaf5;
  --radius:18px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family: -apple-system,BlinkMacSystemFont,"Noto Sans KR","Noto Sans JP",system-ui,sans-serif;
  background: linear-gradient(180deg,#eef4ff 0%,#f9fbff 100%);
  color:var(--text);
}
.safe{
  padding:max(16px,env(safe-area-inset-top)) 16px max(24px,env(safe-area-inset-bottom)) 16px;
}
.wrap{max-width:760px;margin:auto;display:flex;flex-direction:column;gap:16px;}
header{padding:18px 16px 10px 16px;}
h1{margin:0;font-size:20px;font-weight:800;color:var(--primary);}
.sub{font-size:13px;color:var(--muted);margin-top:4px;}

.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:0 8px 24px rgba(47,111,237,.08);
  border:1px solid var(--border);
}
.cardPad{padding:18px;}

.badge{
  display:inline-block;
  padding:6px 12px;
  background:var(--primary-soft);
  color:var(--primary);
  font-weight:700;
  font-size:13px;
  border-radius:999px;
}
.title{margin-top:10px;font-size:18px;font-weight:800;}
.meta{font-size:13px;color:var(--muted);margin-top:2px;}

.sectionTitleRow{
  margin-top:18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.sectionTitle{
  font-size:13px;
  font-weight:700;
  color:var(--muted);
  margin:0;
}
.verseBox{
  margin-top:6px;
  padding:16px;
  border-radius:14px;
  background:var(--primary-soft);
  border:1px solid #dce6ff;
  font-size:18px;
  font-weight:700;
  line-height:1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.explainBox{
  margin-top:6px;
  padding:14px;
  border-radius:14px;
  background:#fafcff;
  border:1px solid var(--border);
  font-size:18px;
  line-height:1.6;
  color:#3a4658;
  white-space: pre-wrap;
  word-break: break-word;
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media(max-width:480px){
  .controls{grid-template-columns:1fr;}
}
label{
  font-size:12px;
  color:var(--muted);
  display:block;
  margin-bottom:6px;
}
input[type="date"]{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:16px;
  background:#fff;
  -webkit-appearance:none;
}
button{
  padding:12px;
  border-radius:12px;
  border:none;
  background:var(--primary);
  color:white;
  font-size:15px;
  font-weight:700;
}
button.secondary{
  background:#e1e9ff;
  color:var(--primary);
}
.btnRow{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}
.btnGroup{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.miniBtn{
  padding:8px 10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#fff;
  color:var(--text);
  font-size:12px;
  font-weight:700;
}
.miniBtn:hover{filter:brightness(0.98);}
.status{
  margin-top:12px;
  font-size:13px;
  color:var(--muted);
}

/* 언어 토글 */
.langRow{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  padding:0 16px 6px 16px;
}
.langBtn{
  padding:8px 10px;
  border-radius:999px;
  border:1px solid var(--border);
  background:#fff;
  color:var(--text);
  font-size:12px;
  font-weight:800;
}
.langBtn.active{
  border-color:#cfe0ff;
  background:var(--primary-soft);
  color:var(--primary);
}
</style>
</head>

<body>
<div class="safe">
  <div class="wrap">

    <header>
      <h1 id="hdrTitle">【오사카온누리】오늘의 성경 암송</h1>
      <div class="sub" id="hdrSub">페이지를 열면 자동으로 오늘 암송이 표시됩니다.</div>
    </header>

    <div class="langRow">
      <button id="btnKo" class="langBtn" type="button">한국어</button>
      <button id="btnJa" class="langBtn" type="button">日本語</button>
    </div>

    <div class="card">
      <div class="cardPad" id="resultArea"></div>
    </div>

    <div class="card">
      <div class="cardPad">

        <div class="controls">
          <div>
            <label id="lblStart">시작일 (암송1)</label>
            <input id="startDate" type="date"/>
          </div>
          <div>
            <label id="lblTarget">조회 날짜</label>
            <input id="targetDate" type="date"/>
          </div>
        </div>

        <div class="btnRow">
          <div class="btnGroup">
            <button id="btnToday" class="secondary" type="button">오늘로</button>
            <button id="btnShow" type="button">조회</button>
          </div>
          <div class="btnGroup">
            <button id="btnPrev" class="secondary" type="button">이전</button>
            <button id="btnNext" class="secondary" type="button">다음</button>
          </div>
        </div>

        <div class="status" id="statusBox" aria-live="polite"></div>

      </div>
    </div>

  </div>
</div>

<script>
let VERSES = []; // JSON에서 로드

// ===== 날짜 유틸 (Safari 안정화)
function toUtcDayNumber(str){
  const [y,m,d]=str.split("-").map(Number);
  return Math.floor(Date.UTC(y,m-1,d)/86400000);
}
function todayISO(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function addDaysISO(str, delta){
  const [y,m,d] = str.split("-").map(Number);
  const ms = Date.UTC(y, m-1, d) + delta * 86400000;
  const nd = new Date(ms);
  const yy = nd.getUTCFullYear();
  const mm = String(nd.getUTCMonth() + 1).padStart(2, "0");
  const dd = String(nd.getUTCDate()).padStart(2, "0");
  return `${yy}-${mm}-${dd}`;
}

const DEFAULT_START="2026-02-08";
const STORAGE_START="memorization_start_v4";
const STORAGE_LANG="memorization_lang_v1";

const startInput=document.getElementById("startDate");
const targetInput=document.getElementById("targetDate");
const resultArea=document.getElementById("resultArea");
const statusBox=document.getElementById("statusBox");

const btnKo=document.getElementById("btnKo");
const btnJa=document.getElementById("btnJa");

const hdrTitle=document.getElementById("hdrTitle");
const hdrSub=document.getElementById("hdrSub");
const lblStart=document.getElementById("lblStart");
const lblTarget=document.getElementById("lblTarget");
const btnToday=document.getElementById("btnToday");
const btnShow=document.getElementById("btnShow");
const btnPrev=document.getElementById("btnPrev");
const btnNext=document.getElementById("btnNext");

// ===== i18n
const I18N = {
  ko: {
    headerTitle: "오늘의 성경 암송【오사카온누리교회】",
    headerSub: "페이지를 열면 자동으로 오늘 암송이 표시됩니다.",
    startLabel: "시작일 (암송1)",
    targetLabel: "조회 날짜",
    todayBtn: "오늘로",
    showBtn: "조회",
    prevBtn: "이전",
    nextBtn: "다음",
    badgeErr: "오류",
    loadFailTitle: "암송 데이터를 불러오지 못했습니다",
    loadFailMeta: "verses.json 확인 필요",
    loadFailHelp:
`• 같은 폴더에 verses.json이 있는지
• 파일이 valid JSON인지
• 로컬 파일(file://)로 직접 열면(fetch) 차단될 수 있으니 서버/호스팅에서 열었는지 확인해 주세요`,
    noData: "암송 데이터가 없습니다.",
    outOfRange: "범위를 벗어난 날짜입니다.",
    sectionVerse: "[암송구절]",
    sectionExplain: "[해설]",
    copyAll: "전체 복사",
    copyVerse: "암송 복사",
    copyExplain: "해설 복사",
    copiedAll: "암송+해설이 복사되었습니다.",
    copiedVerse: "암송이 복사되었습니다.",
    copiedExplain: "해설이 복사되었습니다.",
    copyFail: "복사에 실패했습니다. (브라우저 권한 확인)",
    metaLine: (start, target) => `시작일 ${start} · 조회일 ${target}`,
    badgeLine: (no, total) => `암송 ${no} / ${total}`,
    statusLine: (isToday, no, diff) => `${isToday ? "오늘 " : ""}암송 ${no} (${diff}일째)`,
    copyFormat: (ref, title, verse, exp) =>
      `${ref} (${title})\n\n[암송구절]\n${verse}\n\n[해설]\n${exp}`,
    copyFormatVerse: (ref, title, verse) =>
      `${ref} (${title})\n\n[암송구절]\n${verse}`,
    copyFormatExplain: (ref, title, exp) =>
      `${ref} (${title})\n\n[해설]\n${exp}`,
  },
  ja: {
    headerTitle: "今日の暗唱聖句【大阪オンヌリキリスト教会】",
    headerSub: "ページを開くと、自動的に本日の暗唱が表示されます。",
    startLabel: "開始日（暗唱1）",
    targetLabel: "表示日",
    todayBtn: "今日",
    showBtn: "表示",
    prevBtn: "前へ",
    nextBtn: "次へ",
    badgeErr: "エラー",
    loadFailTitle: "暗唱データを読み込めませんでした",
    loadFailMeta: "verses-j.json の確認が必要です",
    loadFailHelp:
`• 同じフォルダに verses-j.json があるか
• ファイルが正しい JSON か（カンマ/括弧のミスなど）
• file:// で直接開くと fetch がブロックされる場合があります。サーバー/ホスティング上で開いてください`,
    noData: "暗唱データがありません。",
    outOfRange: "範囲外の日付です。",
    sectionVerse: "【暗唱聖句】",
    sectionExplain: "【解説】",
    copyAll: "全部コピー",
    copyVerse: "聖句コピー",
    copyExplain: "解説コピー",
    copiedAll: "聖句＋解説をコピーしました。",
    copiedVerse: "聖句をコピーしました。",
    copiedExplain: "解説をコピーしました。",
    copyFail: "コピーに失敗しました。（権限をご確認ください）",
    metaLine: (start, target) => `開始日 ${start} ・ 表示日 ${target}`,
    badgeLine: (no, total) => `暗唱聖句 ${no} / ${total}`,
    statusLine: (isToday, no, diff) => `${isToday ? "本日 " : ""}暗唱 ${no}（${diff}日目）`,
    copyFormat: (ref, title, verse, exp) =>
      `${ref} (${title})\n\n【暗唱聖句】\n${verse}\n\n【解説】\n${exp}`,
    copyFormatVerse: (ref, title, verse) =>
      `${ref} (${title})\n\n【暗唱聖句】\n${verse}`,
    copyFormatExplain: (ref, title, exp) =>
      `${ref} (${title})\n\n【解説】\n${exp}`,
  }
};

let LANG = "ko";
function detectDefaultLang(){
  const saved = localStorage.getItem(STORAGE_LANG);
  if(saved === "ko" || saved === "ja") return saved;

  const nav = (navigator.language || "").toLowerCase();
  // 일본 브라우저면 ja 우선
  if(nav.startsWith("ja")) return "ja";
  return "ko";
}

function applyLang(lang){
  LANG = (lang === "ja") ? "ja" : "ko";
  localStorage.setItem(STORAGE_LANG, LANG);

  const t = I18N[LANG];

  document.documentElement.lang = LANG;
  hdrTitle.textContent = t.headerTitle;
  hdrSub.textContent = t.headerSub;

  lblStart.textContent = t.startLabel;
  lblTarget.textContent = t.targetLabel;

  btnToday.textContent = t.todayBtn;
  btnShow.textContent = t.showBtn;
  btnPrev.textContent = t.prevBtn;
  btnNext.textContent = t.nextBtn;

  btnKo.classList.toggle("active", LANG === "ko");
  btnJa.classList.toggle("active", LANG === "ja");

    // 언어 변경 시 해당 언어 JSON 다시 로드
  loadVerses()
    .then(render)
    .catch(()=>{ /* 에러 UI는 loadVerses에서 처리 */ });
}

// ===== JSON 로드 (언어별 파일)
async function loadVerses(){
  const file = (LANG === "ja") ? "./verses-j.json" : "./verses.json";

  try{
    const res = await fetch(file, { cache: "no-store" });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if(!Array.isArray(data) || data.length === 0){
      throw new Error(`${file} 형식이 올바르지 않거나 비어 있습니다.`);
    }

    data.sort((a,b)=>(a.no??0)-(b.no??0));
    VERSES = data;
  }catch(e){
    const t = I18N[LANG];
    resultArea.innerHTML = `
      <div class="badge">${t.badgeErr}</div>
      <div class="title">${t.loadFailTitle}</div>
      <div class="meta">${t.loadFailMeta}</div>
      <div class="explainBox" style="margin-top:12px;"></div>
    `;
    const box = resultArea.querySelector(".explainBox");
    box.textContent = String(e) + "\n\n" + t.loadFailHelp;
    statusBox.textContent = "";
    throw e;
  }
}

// 복사 기능
async function copyText(text){
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
      return true;
    }
  }catch(e){}
  try{
    const ta=document.createElement("textarea");
    ta.value=text;
    ta.style.position="fixed";
    ta.style.opacity="0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok=document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  }catch(e){
    return false;
  }
}

function flashStatus(msg){
  statusBox.textContent = msg;
  setTimeout(()=>{ if(statusBox.textContent === msg) statusBox.textContent=""; }, 2000);
}

function render(){
  const start=startInput.value;
  const target=targetInput.value;
  if(!start||!target) return;

  localStorage.setItem(STORAGE_START,start);

  const t = I18N[LANG];

  if(!VERSES.length){
    resultArea.textContent = t.noData;
    return;
  }

  const diff=toUtcDayNumber(target)-toUtcDayNumber(start);
  const no=diff+1;
  const total = VERSES.length;

  if(no<1||no>total){
    resultArea.textContent = t.outOfRange;
    statusBox.textContent="";
    return;
  }

  const v=VERSES[no-1];
  const ref = v.ref ?? "";
  const title = v.title ?? "";
  const verse = v.verse ?? "";
  const exp = v.explanation ?? "";

  // 복사용 텍스트
  const verseToCopy   = t.copyFormatVerse(ref, title, verse);
  const explainToCopy = t.copyFormatExplain(ref, title, exp);
  const allToCopy     = t.copyFormat(ref, title, verse, exp);

  // 골격만 innerHTML / 본문은 textContent로 안전 주입
  resultArea.innerHTML=`
    <div class="badge">${t.badgeLine(v.no, total)}</div>
    <div class="title" id="titleText"></div>
    <div class="meta">${t.metaLine(start, target)}</div>

    <div class="sectionTitleRow">
      <div class="sectionTitle">${t.sectionVerse}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
        <button class="miniBtn" id="btnCopyAll" type="button">${t.copyAll}</button>
        <button class="miniBtn" id="btnCopyVerse" type="button">${t.copyVerse}</button>
      </div>
    </div>
    <div class="verseBox" id="verseText"></div>

    <div class="sectionTitleRow">
      <div class="sectionTitle">${t.sectionExplain}</div>
      <button class="miniBtn" id="btnCopyExplain" type="button">${t.copyExplain}</button>
    </div>
    <div class="explainBox" id="explainText"></div>
  `;

  document.getElementById("titleText").textContent = `${ref} (${title})`;
  document.getElementById("verseText").textContent = verse;
  document.getElementById("explainText").textContent = exp;

  document.getElementById("btnCopyAll").onclick = async () => {
    const ok = await copyText(allToCopy);
    flashStatus(ok ? t.copiedAll : t.copyFail);
  };
  document.getElementById("btnCopyVerse").onclick = async () => {
    const ok = await copyText(verseToCopy);
    flashStatus(ok ? t.copiedVerse : t.copyFail);
  };
  document.getElementById("btnCopyExplain").onclick = async () => {
    const ok = await copyText(explainToCopy);
    flashStatus(ok ? t.copiedExplain : t.copyFail);
  };

  statusBox.textContent = t.statusLine(target===todayISO(), v.no, diff);
}

// 버튼 바인딩
btnKo.onclick = () => applyLang("ko");
btnJa.onclick = () => applyLang("ja");

btnToday.onclick=()=>{
  targetInput.value=todayISO();
  render();
};
btnShow.onclick=render;

btnPrev.onclick=()=>{
  if(!targetInput.value) targetInput.value = todayISO();
  targetInput.value = addDaysISO(targetInput.value, -1);
  render();
};
btnNext.onclick=()=>{
  if(!targetInput.value) targetInput.value = todayISO();
  targetInput.value = addDaysISO(targetInput.value, +1);
  render();
};

startInput.onchange=render;
targetInput.onchange=render;

async function init(){
  LANG = detectDefaultLang();
  localStorage.setItem(STORAGE_LANG, LANG);

  // UI 먼저 적용 (render는 아직 하지 않게끔 applyLang 안에서 loadVerses가 처리)
  const t = I18N[LANG];
  document.documentElement.lang = LANG;
  hdrTitle.textContent = t.headerTitle;
  hdrSub.textContent = t.headerSub;
  lblStart.textContent = t.startLabel;
  lblTarget.textContent = t.targetLabel;
  btnToday.textContent = t.todayBtn;
  btnShow.textContent = t.showBtn;
  btnPrev.textContent = t.prevBtn;
  btnNext.textContent = t.nextBtn;
  btnKo.classList.toggle("active", LANG === "ko");
  btnJa.classList.toggle("active", LANG === "ja");

  startInput.value = localStorage.getItem(STORAGE_START) || DEFAULT_START;
  targetInput.value = todayISO();

  await loadVerses();
  render();
}
init();
</script>
</body>
</html>
