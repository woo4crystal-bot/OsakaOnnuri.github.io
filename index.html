<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="color-scheme" content="light"/>
<title>오늘의 성경암송 | 今日の暗唱聖句</title>

<style>
:root{
  --bg-1:#0b1020;
  --bg-2:#0a1630;
  --text:#eef2ff;
  --muted:rgba(238,242,255,.72);
  --accent:#7c3aed;
  --accent2:#06b6d4;
  --gold:#f6c453;
  --border:rgba(255,255,255,.14);
  --radius:22px;
  --shadow:0 18px 40px rgba(0,0,0,.35);
  --shadow2:0 10px 26px rgba(0,0,0,.24);
  --glass:blur(12px);
  --danger:#ef4444;
}

*{box-sizing:border-box;}
html,body{height:100%;}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Noto Sans JP",system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 520px at 15% 0%, rgba(124,58,237,.45), transparent 60%),
    radial-gradient(900px 520px at 90% 10%, rgba(6,182,212,.35), transparent 55%),
    radial-gradient(700px 480px at 50% 100%, rgba(246,196,83,.18), transparent 62%),
    linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
}

.safe{
  padding:max(18px,env(safe-area-inset-top)) 16px max(30px,env(safe-area-inset-bottom)) 16px;
}

.wrap{
  max-width:820px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:14px;
}

header{
  padding:26px 18px 14px 18px;
  border-bottom:1px solid rgba(255,255,255,.10);
  position:relative;
}
header::after{
  content:"";
  position:absolute;
  left:18px; right:18px; bottom:-1px;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(246,196,83,.55), transparent);
  opacity:.9;
}

h1{
  margin:0;
  font-size:19px;
  font-weight:950;
  letter-spacing:-.2px;
  background:linear-gradient(90deg, #ffffff, rgba(255,255,255,.92), rgba(6,182,212,.92));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.sub{
  font-size:12.8px;
  color:var(--muted);
  margin-top:8px;
  line-height:1.5;
}

.card{
  background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.14);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  backdrop-filter:var(--glass);
  -webkit-backdrop-filter:var(--glass);
  position:relative;
}
.card::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(135deg, rgba(124,58,237,.40), rgba(6,182,212,.22), rgba(246,196,83,.18));
  opacity:.35;
  filter:blur(18px);
  z-index:0;
}
.cardPad{
  padding:18px;
  position:relative;
  z-index:1;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:7px 12px;
  border-radius:999px;
  font-size:16px;
  font-weight:950;
  color:rgba(255,255,255,.92);
  background:linear-gradient(90deg, rgba(124,58,237,.55), rgba(6,182,212,.35));
  border:1px solid rgba(255,255,255,.18);
  box-shadow:var(--shadow2);
}

.title{
  margin-top:12px;
  font-size:19px;
  font-weight:950;
  color:rgba(95,251,241,.88);
  text-shadow:0 1px 2px rgba(0,0,0,.55);
  letter-spacing:-.2px;
  line-height:1.25;
}

.meta{
  font-size:12.7px;
  color:var(--muted);
  margin-top:6px;
}

.sectionTitleRow{
  margin-top:18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.sectionTitle{
  font-size:14px;
  font-weight:950;
  color:rgba(255,255,255,.88);
  margin:0;
  letter-spacing:.55px;
  position:relative;
  padding-left:12px;
}
.sectionTitle::before{
  content:"";
  position:absolute;
  left:0;
  top:50%;
  width:6px;
  height:6px;
  border-radius:50%;
  background:linear-gradient(180deg, var(--gold), rgba(246,196,83,.35));
  transform:translateY(-50%);
  box-shadow:0 0 0 4px rgba(246,196,83,.10);
}

.verseBox{
  margin-top:10px;
  padding:18px;
  border-radius:18px;
  background:
    radial-gradient(450px 220px at 20% 0%, rgba(124,58,237,.20), transparent 60%),
    radial-gradient(450px 220px at 80% 10%, rgba(6,182,212,.18), transparent 58%),
    linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.16);
  box-shadow:0 18px 40px rgba(0,0,0,.26);
  font-size:19px;
  font-weight:900;
  line-height:1.85;
  color:rgba(249,248,113,.96);
  text-shadow:0 1px 2px rgba(0,0,0,.55);
  white-space:pre-wrap;
  word-break:break-word;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

.explainBox{
  margin-top:10px;
  padding:16px 18px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
  border:1px solid rgba(255,255,255,.14);
  font-size:18px;
  line-height:1.8;
  color:rgba(255,255,255,.88);
  text-shadow:0 1px 2px rgba(0,0,0,.55);
  white-space:pre-wrap;
  word-break:break-word;
  box-shadow:0 14px 34px rgba(0,0,0,.22);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.controls.single{
  grid-template-columns:1fr;
}

@media(max-width:520px){
  .controls{grid-template-columns:1fr;}
}

label{
  font-size:14px;
  color:rgba(238,242,255,.74);
  display:block;
  margin-bottom:6px;
  font-weight:950;
}

input[type="date"],
input[type="text"]{
  width:100%;
  padding:12px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.18);
  font-size:16px;
  background:rgba(10,22,48,.55);
  color:rgba(255,255,255,.92);
  outline:none;
  -webkit-appearance:none;
  transition:box-shadow .15s ease, border-color .15s ease, transform .06s ease;
}
input[type="text"]::placeholder{
  color:rgba(238,242,255,.42);
}
input[type="date"]:focus,
input[type="text"]:focus{
  border-color:rgba(6,182,212,.45);
  box-shadow:0 0 0 4px rgba(6,182,212,.16);
}
input[type="date"]:active,
input[type="text"]:active{
  transform:translateY(1px);
}

button{
  padding:12px 14px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.18);
  background:linear-gradient(135deg, rgba(124,58,237,.95), rgba(6,182,212,.70));
  color:#fff;
  font-size:14.6px;
  font-weight:950;
  letter-spacing:-.1px;
  box-shadow:0 14px 34px rgba(0,0,0,.26);
  transition:transform .06s ease, filter .15s ease, box-shadow .15s ease;
}
button:hover{filter:brightness(1.03);}
button:active{transform:translateY(1px);}

button.secondary{
  background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06));
  color:rgba(255,255,255,.92);
  border:1px solid rgba(255,255,255,.16);
  box-shadow:none;
}

button.danger{
  background:linear-gradient(135deg, rgba(239,68,68,.95), rgba(185,28,28,.82));
  color:#fff;
}

.btnRow{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}
.btnGroup{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.miniBtn{
  padding:8px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(10,22,48,.45);
  color:rgba(255,255,255,.90);
  font-size:12px;
  font-weight:950;
  box-shadow:none;
  transition:filter .15s ease, transform .06s ease;
}
.miniBtn:hover{filter:brightness(1.05);}
.miniBtn:active{transform:translateY(1px);}

.topBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.topNav{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.status{
  margin-top:12px;
  font-size:12.8px;
  color:rgba(238,242,255,.76);
  line-height:1.55;
  min-height:1.55em;
}

.langRow{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  padding:0 18px 8px 18px;
}
.langBtn{
  padding:8px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(10,22,48,.38);
  color:rgba(255,255,255,.86);
  font-size:12px;
  font-weight:950;
  box-shadow:none;
}
.langBtn.active{
  border-color:rgba(246,196,83,.42);
  background:linear-gradient(180deg, rgba(246,196,83,.22), rgba(255,255,255,.06));
  color:rgba(246,196,83,.92);
}

button:disabled{
  opacity:.45;
  cursor:not-allowed;
  filter:saturate(.8);
}

.recordWrap{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.recordHead{
  margin-top:12px; /* 타이틀과 상태 영역 간격을 자연스럽게 증가 */
}

.recordInfo{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

.recordBadge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
  font-size:12px;
  font-weight:900;
  color:rgba(255,255,255,.86);
}

.recDot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--danger);
  box-shadow:0 0 0 0 rgba(239,68,68,.75);
}

.recording .recDot{
  animation:recPulse 1.2s infinite;
}

@keyframes recPulse{
  0%{ box-shadow:0 0 0 0 rgba(239,68,68,.75); opacity:1; }
  70%{ box-shadow:0 0 0 10px rgba(239,68,68,0); opacity:.85; }
  100%{ box-shadow:0 0 0 0 rgba(239,68,68,0); opacity:1; }
}

.timer{
  font-variant-numeric:tabular-nums;
  letter-spacing:.4px;
}

.audioWrap{
  margin-top:6px;
}

audio{
  width:100%;
  display:block;
  border-radius:14px;
}

.recHint{
  font-size:12px;
  color:rgba(238,242,255,.66);
  line-height:1.6;
}
</style>
</head>

<body>
<div class="safe">
  <div class="wrap">

    <header>
      <h1 id="hdrTitle">오늘의 성경암송【오사카온누리교회】</h1>
      <div class="sub" id="hdrSub">페이지를 열면 자동으로 오늘 암송이 표시됩니다.</div>
    </header>

    <div class="langRow">
      <button id="btnKo" class="langBtn" type="button">한국어</button>
      <button id="btnJa" class="langBtn" type="button">日本語</button>
    </div>

    <div class="card">
      <div class="cardPad" id="resultArea"></div>
    </div>

    <div class="card">
      <div class="cardPad">

        <div class="controls">
          <div>
            <label id="lblStart">시작일 (암송1)</label>
            <input id="startDate" type="date"/>
          </div>
          <div>
            <label id="lblTarget">조회 날짜</label>
            <input id="targetDate" type="date"/>
          </div>
        </div>

        <div class="btnRow">
          <div class="btnGroup">
            <button id="btnToday" class="secondary" type="button">오늘</button>
          </div>
          <div class="btnGroup">
            <button id="btnPrev" class="secondary" type="button">이전</button>
            <button id="btnNext" class="secondary" type="button">다음</button>
          </div>
        </div>

        <div class="status" id="statusBox" aria-live="polite"></div>

      </div>
    </div>

    <div class="card">
      <div class="cardPad">
        <div class="sectionTitleRow">
          <div class="sectionTitle" id="recTitle">[ 내 암송 녹음 ]</div>
        </div>

        <div class="recordWrap" id="recordWrap">
          <div class="recordHead">
            <div class="recordInfo">
              <div class="recordBadge" id="recStateBadge">
                <span class="recDot"></span>
                <span id="recStateText">대기 중</span>
              </div>
              <div class="recordBadge timer" id="recTimer">00:00</div>
            </div>
          </div>

          <div class="controls single">
            <div>
              <label id="lblRecorderName">이름</label>
              <input id="recorderName" type="text" maxlength="40" placeholder="예: 철수"/>
            </div>
          </div>

          <div class="btnRow" style="margin-top:0;">
            <div class="btnGroup">
              <button id="btnRecStart" type="button">녹음 시작</button>
              <button id="btnRecStop" class="secondary" type="button" disabled>녹음 종료</button>
              <button id="btnRecReset" class="secondary" type="button" disabled>녹음 삭제</button>
            </div>
            <div class="btnGroup">
              <button id="btnRecSave" class="secondary" type="button" disabled>파일 저장</button>
            </div>
          </div>

          <div class="status" id="recStatus" aria-live="polite"></div>

          <div class="audioWrap">
            <audio id="recordedAudio" controls style="display:none;"></audio>
          </div>

          <div class="recHint" id="recHint">
            iPhone / Safari 에서는 HTTPS 환경에서 여는 것이 가장 안정적입니다.
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

      `${ref} (${title})\n\n【暗唱聖句】\n${verse}`,
    copyFormatExplain: (ref, title, exp) =>
      `${ref} (${title})\n\n【解説】\n${exp}`,

    recTitle: "【 自分の暗唱録音 】",
    recStart: "録音開始",
    recStop: "録音終了",
    recReset: "録音削除",
    recSave: "ファイル保存",
    recPreparing: "マイク権限を確認しています...",
    recRecording: "録音中です...",
    recStopped: "録音が完了しました。",
    recSaved: "録音ファイルの保存画面を開きました。",
    recNoData: "保存する録音ファイルがありません。",
    recUnsupported: "このブラウザは録音に対応していません。",
    recPermissionDenied: "マイクの権限が必要です。",
    recHttpsHint: "iPhone / Safari では HTTPS 環境で開くのが安全です。",
    recDeleted: "録音を削除しました。",
    recIdle: "待機中",
    recRecordingState: "録音中",
    recRecordedState: "録音完了",
    recorderNameLabel: "名前",
    recorderNamePlaceholder: "例: 太郎",
    recFileNameNoName: (no, ref, date, ext) => `暗唱${no}_${ref}_${date}.${ext}`,
    recFileNameWithName: (no, ref, name, date, ext) => `暗唱${no}_${ref}_${name}_${date}.${ext}`,
  }
};

function toUtcDayNumber(str){
  const [y, m, d] = str.split("-").map(Number);
  return Math.floor(Date.UTC(y, m - 1, d) / 86400000);
}

function todayISO(){
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: "Asia/Tokyo",
    year: "numeric",
    month: "2-digit",
    day: "2-digit"
  }).formatToParts(new Date());

  const y = parts.find(p => p.type === "year").value;
  const m = parts.find(p => p.type === "month").value;
  const d = parts.find(p => p.type === "day").value;
  return `${y}-${m}-${d}`;
}

function addDaysISO(str, delta){
  const [y, m, d] = str.split("-").map(Number);
  const ms = Date.UTC(y, m - 1, d) + delta * 86400000;
  const nd = new Date(ms);
  const yy = nd.getUTCFullYear();
  const mm = String(nd.getUTCMonth() + 1).padStart(2, "0");
  const dd = String(nd.getUTCDate()).padStart(2, "0");
  return `${yy}-${mm}-${dd}`;
}

function detectDefaultLang(){
  const saved = localStorage.getItem(STORAGE_LANG);
  if(saved === "ko" || saved === "ja") return saved;

  const nav = (navigator.language || "").toLowerCase();
  return nav.startsWith("ja") ? "ja" : "ko";
}

function sanitizeFilePart(text){
  return String(text || "")
    .trim()
    .replace(/[\\/:*?"<>|]/g, "_")
    .replace(/\s+/g, "_")
    .replace(/_+/g, "_")
    .replace(/^_+|_+$/g, "");
}

function getRecorderName(){
  return sanitizeFilePart(recorderNameInput.value);
}

function setUIText(){
  const t = I18N[LANG];
  document.documentElement.lang = LANG;
  hdrTitle.textContent = t.headerTitle;
  hdrSub.textContent = t.headerSub;
  lblStart.textContent = t.startLabel;
  lblTarget.textContent = t.targetLabel;
  btnToday.textContent = t.todayBtn;
  btnPrev.textContent = t.prevBtn;
  btnNext.textContent = t.nextBtn;
  btnKo.classList.toggle("active", LANG === "ko");
  btnJa.classList.toggle("active", LANG === "ja");

  recTitle.textContent = t.recTitle;
  btnRecStart.textContent = t.recStart;
  btnRecStop.textContent = t.recStop;
  btnRecReset.textContent = t.recReset;
  btnRecSave.textContent = t.recSave;
  recHint.textContent = t.recHttpsHint;
  lblRecorderName.textContent = t.recorderNameLabel;
  recorderNameInput.placeholder = t.recorderNamePlaceholder;

  if(mediaRecorder && mediaRecorder.state === "recording"){
    recStateText.textContent = t.recRecordingState;
  }else if(recordedBlob){
    recStateText.textContent = t.recRecordedState;
  }else{
    recStateText.textContent = t.recIdle;
  }
}

async function loadVerses(){
  const seq = ++loadSeq;
  const file = LANG === "ja" ? "./verses-j.json" : "./verses.json";

  try{
    const res = await fetch(file, { cache: "no-store" });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    if(seq !== loadSeq) return false;

    if(!Array.isArray(data) || data.length === 0){
      throw new Error(`${file} 형식이 올바르지 않거나 비어 있습니다.`);
    }

    data.sort((a, b) => (a.no ?? 0) - (b.no ?? 0));
    VERSES = data;
    updateDateLimits();
    return true;
  }catch(e){
    if(seq !== loadSeq) return false;

    const t = I18N[LANG];
    resultArea.innerHTML = `
      <div class="badge">${t.badgeErr}</div>
      <div class="title">${t.loadFailTitle}</div>
      <div class="meta">${t.loadFailMeta}</div>
      <div class="explainBox" style="margin-top:12px;"></div>
    `;
    resultArea.querySelector(".explainBox").textContent =
      String(e) + "\n\n" + t.loadFailHelp;

    statusBox.dataset.baseStatus = "";
    statusBox.textContent = "";
    updateBottomNavDisabled(true, true);
    return false;
  }
}

async function applyLang(lang){
  LANG = lang === "ja" ? "ja" : "ko";
  localStorage.setItem(STORAGE_LANG, LANG);
  setUIText();

  const ok = await loadVerses();
  if(ok) render();
}

function updateBottomNavDisabled(prevDisabled, nextDisabled){
  btnPrev.disabled = prevDisabled;
  btnNext.disabled = nextDisabled;
}

function setTopNavDisabled(no, total){
  const btnPrevTop = document.getElementById("btnPrevTop");
  const btnNextTop = document.getElementById("btnNextTop");
  if(btnPrevTop) btnPrevTop.disabled = no <= 1;
  if(btnNextTop) btnNextTop.disabled = no >= total;
}

function flashStatus(msg){
  const base = statusBox.dataset.baseStatus || "";
  statusBox.textContent = msg;

  if(flashTimer) clearTimeout(flashTimer);
  flashTimer = setTimeout(() => {
    statusBox.textContent = base;
  }, 2000);
}

async function copyText(text){
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
      return true;
    }
  }catch(e){}

  try{
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  }catch(e){
    return false;
  }
}

function moveDay(delta){
  if(!targetInput.value) targetInput.value = todayISO();
  targetInput.value = addDaysISO(targetInput.value, delta);
  render();
}

function updateDateLimits(){
  if(!startInput.value || !VERSES.length) return;
  targetInput.min = startInput.value;
  targetInput.max = addDaysISO(startInput.value, VERSES.length - 1);
}

function render(){
  const start = startInput.value;
  const target = targetInput.value;
  const t = I18N[LANG];

  if(!start || !target) return;

  localStorage.setItem(STORAGE_START, start);
  updateDateLimits();

  if(!VERSES.length){
    resultArea.textContent = t.noData;
    statusBox.dataset.baseStatus = "";
    statusBox.textContent = "";
    updateBottomNavDisabled(true, true);
    return;
  }

  const diff = toUtcDayNumber(target) - toUtcDayNumber(start);
  const no = diff + 1;
  const total = VERSES.length;

  if(no < 1 || no > total){
    resultArea.textContent = t.outOfRange;
    statusBox.dataset.baseStatus = "";
    statusBox.textContent = "";
    updateBottomNavDisabled(no <= 1, no >= total);
    return;
  }

  updateBottomNavDisabled(no <= 1, no >= total);

  const v = VERSES[no - 1];
  const ref = v.ref ?? "";
  const title = v.title ?? "";
  const verse = v.verse ?? "";
  const exp = v.explanation ?? "";

  const verseToCopy = t.copyFormatVerse(ref, title, verse);
  const explainToCopy = t.copyFormatExplain(ref, title, exp);
  const allToCopy = t.copyFormat(ref, title, verse, exp);

  resultArea.innerHTML = `
    <div class="topBar">
      <div class="badge">${t.badgeLine(no, total)}</div>
      <div class="topNav">
        <button class="miniBtn" id="btnPrevTop" type="button">${t.prevBtn}</button>
        <button class="miniBtn" id="btnNextTop" type="button">${t.nextBtn}</button>
      </div>
    </div>

    <div class="title" id="titleText"></div>
    <div class="meta">${t.metaLine(start, target)}</div>

    <div class="sectionTitleRow">
      <div class="sectionTitle">${t.sectionVerse}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
        <button class="miniBtn" id="btnCopyAll" type="button">${t.copyAll}</button>
        <button class="miniBtn" id="btnCopyVerse" type="button">${t.copyVerse}</button>
      </div>
    </div>
    <div class="verseBox" id="verseText"></div>

    <div class="sectionTitleRow">
      <div class="sectionTitle">${t.sectionExplain}</div>
      <button class="miniBtn" id="btnCopyExplain" type="button">${t.copyExplain}</button>
    </div>
    <div class="explainBox" id="explainText"></div>
  `;

  document.getElementById("titleText").textContent = `${ref} (${title})`;
  document.getElementById("verseText").textContent = verse;
  document.getElementById("explainText").textContent = exp;

  document.getElementById("btnPrevTop").onclick = () => moveDay(-1);
  document.getElementById("btnNextTop").onclick = () => moveDay(1);

  document.getElementById("btnCopyAll").onclick = async () => {
    const ok = await copyText(allToCopy);
    flashStatus(ok ? t.copiedAll : t.copyFail);
  };
  document.getElementById("btnCopyVerse").onclick = async () => {
    const ok = await copyText(verseToCopy);
    flashStatus(ok ? t.copiedVerse : t.copyFail);
  };
  document.getElementById("btnCopyExplain").onclick = async () => {
    const ok = await copyText(explainToCopy);
    flashStatus(ok ? t.copiedExplain : t.copyFail);
  };

  setTopNavDisabled(no, total);

  const baseStatus = t.statusLine(target === todayISO(), no, diff);
  statusBox.dataset.baseStatus = baseStatus;
  statusBox.textContent = baseStatus;
}

function canRecord(){
  return !!(
    navigator.mediaDevices &&
    navigator.mediaDevices.getUserMedia &&
    window.MediaRecorder
  );
}

function pickSupportedMimeType(){
  const candidates = [
    "audio/mp4",
    "audio/webm;codecs=opus",
    "audio/webm",
    "audio/ogg;codecs=opus",
    "audio/ogg"
  ];

  for(const type of candidates){
    try{
      if(MediaRecorder.isTypeSupported(type)) return type;
    }catch(e){}
  }
  return "";
}

function currentVerseInfo(){
  const start = startInput.value;
  const target = targetInput.value;

  if(!start || !target || !VERSES.length) return null;

  const diff = toUtcDayNumber(target) - toUtcDayNumber(start);
  const no = diff + 1;
  if(no < 1 || no > VERSES.length) return null;

  const v = VERSES[no - 1];
  return {
    no,
    ref: sanitizeFilePart(v.ref || "verse"),
    title: v.title || "",
    target
  };
}

function formatSeconds(sec){
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

function startRecordTimer(){
  stopRecordTimer();
  recordStartedAt = Date.now();
  recTimer.textContent = "00:00";
  recordTimerId = setInterval(() => {
    const elapsed = Math.floor((Date.now() - recordStartedAt) / 1000);
    recTimer.textContent = formatSeconds(elapsed);
  }, 250);
}

function stopRecordTimer(){
  if(recordTimerId){
    clearInterval(recordTimerId);
    recordTimerId = null;
  }
}

function setRecordingUIState(state){
  const t = I18N[LANG];

  if(state === "recording"){
    recordWrap.classList.add("recording");
    recStateText.textContent = t.recRecordingState;
    btnRecStart.disabled = true;
    btnRecStop.disabled = false;
    btnRecReset.disabled = true;
    btnRecSave.disabled = true;
  }else if(state === "recorded"){
    recordWrap.classList.remove("recording");
    recStateText.textContent = t.recRecordedState;
    btnRecStart.disabled = false;
    btnRecStop.disabled = true;
    btnRecReset.disabled = false;
    btnRecSave.disabled = false;
  }else{
    recordWrap.classList.remove("recording");
    recStateText.textContent = t.recIdle;
    btnRecStart.disabled = !canRecord();
    btnRecStop.disabled = true;
    btnRecReset.disabled = !recordedBlob;
    btnRecSave.disabled = !recordedBlob;
  }
}

function cleanupStream(){
  if(mediaStream){
    mediaStream.getTracks().forEach(track => track.stop());
    mediaStream = null;
  }
}

function clearRecording({ keepStatus = false } = {}){
  stopRecordTimer();
  cleanupStream();

  if(mediaRecorder && mediaRecorder.state !== "inactive"){
    try{ mediaRecorder.stop(); }catch(e){}
  }
  mediaRecorder = null;
  recordChunks = [];
  recordedMimeType = "";

  if(recordedAudio.src){
    URL.revokeObjectURL(recordedAudio.src);
  }
  recordedAudio.removeAttribute("src");
  recordedAudio.style.display = "none";
  recordedBlob = null;
  recTimer.textContent = "00:00";

  setRecordingUIState("idle");
  if(!keepStatus) recStatus.textContent = "";
}

async function startRecording(){
  const t = I18N[LANG];

  if(!canRecord()){
    recStatus.textContent = `${t.recUnsupported} ${t.recHttpsHint}`;
    setRecordingUIState("idle");
    return;
  }

  try{
    clearRecording({ keepStatus: true });
    recStatus.textContent = t.recPreparing;

    const mimeType = pickSupportedMimeType();
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      }
    });

    recordChunks = [];
    recordedBlob = null;
    recordedMimeType = mimeType || "audio/webm";

    mediaRecorder = mimeType
      ? new MediaRecorder(mediaStream, { mimeType })
      : new MediaRecorder(mediaStream);

    mediaRecorder.ondataavailable = (e) => {
      if(e.data && e.data.size > 0){
        recordChunks.push(e.data);
      }
    };

    mediaRecorder.onstop = () => {
      stopRecordTimer();

      if(recordChunks.length){
        recordedBlob = new Blob(recordChunks, {
          type: mediaRecorder?.mimeType || recordedMimeType || "audio/webm"
        });

        const url = URL.createObjectURL(recordedBlob);
        recordedAudio.src = url;
        recordedAudio.style.display = "block";

        setRecordingUIState("recorded");
        recStatus.textContent = t.recStopped;
      }else{
        setRecordingUIState("idle");
      }

      cleanupStream();
      mediaRecorder = null;
    };

    mediaRecorder.start();
    startRecordTimer();
    setRecordingUIState("recording");
    recStatus.textContent = t.recRecording;
  }catch(e){
    stopRecordTimer();
    cleanupStream();
    mediaRecorder = null;
    setRecordingUIState("idle");
    recStatus.textContent = `${t.recPermissionDenied} (${e.message || e})`;
  }
}

function stopRecording(){
  if(mediaRecorder && mediaRecorder.state !== "inactive"){
    mediaRecorder.stop();
  }
}

function getRecordingExtension(mimeType){
  if(!mimeType) return "webm";
  if(mimeType.includes("mp4")) return "m4a";
  if(mimeType.includes("ogg")) return "ogg";
  return "webm";
}

function saveBlobToFile(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.rel = "noopener";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}

async function saveRecording(){
  const t = I18N[LANG];

  if(!recordedBlob){
    recStatus.textContent = t.recNoData;
    return;
  }

  const info = currentVerseInfo() || {
    no: 0,
    ref: "verse",
    target: todayISO()
  };

  const ext = getRecordingExtension(recordedBlob.type);
  const safeName = getRecorderName();

  const filename = safeName
    ? t.recFileNameWithName(info.no, info.ref, safeName, info.target, ext)
    : t.recFileNameNoName(info.no, info.ref, info.target, ext);

  try{
    saveBlobToFile(recordedBlob, filename);
    recStatus.textContent = t.recSaved;
  }catch(e){
    recStatus.textContent = `${t.recNoData} (${e.message || e})`;
  }
}

function resetRecording(){
  const t = I18N[LANG];
  clearRecording({ keepStatus: true });
  recStatus.textContent = t.recDeleted;
}

btnKo.onclick = () => applyLang("ko");
btnJa.onclick = () => applyLang("ja");

btnToday.onclick = () => {
  targetInput.value = todayISO();
  render();
};

btnPrev.onclick = () => moveDay(-1);
btnNext.onclick = () => moveDay(1);

startInput.onchange = () => {
  updateDateLimits();
  render();
};
targetInput.onchange = render;

btnRecStart.onclick = startRecording;
btnRecStop.onclick = stopRecording;
btnRecReset.onclick = resetRecording;
btnRecSave.onclick = saveRecording;

recorderNameInput.addEventListener("input", () => {
  localStorage.setItem(STORAGE_RECORDER_NAME, recorderNameInput.value);
});

window.addEventListener("pagehide", () => {
  stopRecordTimer();
  cleanupStream();
});

async function init(){
  LANG = detectDefaultLang();
  startInput.value = localStorage.getItem(STORAGE_START) || DEFAULT_START;
  targetInput.value = todayISO();
  recorderNameInput.value = localStorage.getItem(STORAGE_RECORDER_NAME) || "";
  setUIText();

  const ok = await loadVerses();
  if(ok) render();

  if(!canRecord()){
    recStatus.textContent = `${I18N[LANG].recUnsupported} ${I18N[LANG].recHttpsHint}`;
    btnRecStart.disabled = true;
    btnRecStop.disabled = true;
    btnRecReset.disabled = true;
    btnRecSave.disabled = true;
  }else{
    setRecordingUIState("idle");
  }
}

init();
</script>
</body>
