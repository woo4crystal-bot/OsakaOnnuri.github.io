<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="color-scheme" content="light"/>
<title>【오사카온누리】오늘의 성경 암송</title>

<style>
:root{
  --bg:#f4f8ff;
  --card:#ffffff;
  --primary:#2f6fed;
  --primary-soft:#eaf1ff;
  --text:#1c2433;
  --muted:#6b768a;
  --border:#e3eaf5;
  --radius:18px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family: -apple-system,BlinkMacSystemFont,"Noto Sans KR",system-ui,sans-serif;
  background: linear-gradient(180deg,#eef4ff 0%,#f9fbff 100%);
  color:var(--text);
}
.safe{
  padding:max(16px,env(safe-area-inset-top)) 16px max(24px,env(safe-area-inset-bottom)) 16px;
}
.wrap{max-width:760px;margin:auto;display:flex;flex-direction:column;gap:16px;}
header{padding:18px 16px 10px 16px;}
h1{margin:0;font-size:20px;font-weight:800;color:var(--primary);}
.sub{font-size:13px;color:var(--muted);margin-top:4px;}

.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:0 8px 24px rgba(47,111,237,.08);
  border:1px solid var(--border);
}
.cardPad{padding:18px;}

.badge{
  display:inline-block;
  padding:6px 12px;
  background:var(--primary-soft);
  color:var(--primary);
  font-weight:700;
  font-size:13px;
  border-radius:999px;
}
.title{margin-top:10px;font-size:18px;font-weight:800;}
.meta{font-size:13px;color:var(--muted);margin-top:2px;}

.sectionTitleRow{
  margin-top:18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.sectionTitle{
  font-size:13px;
  font-weight:700;
  color:var(--muted);
  margin:0;
}
.verseBox{
  margin-top:6px;
  padding:16px;
  border-radius:14px;
  background:var(--primary-soft);
  border:1px solid #dce6ff;
  font-size:18px;
  font-weight:700;
  line-height:1.6;
  
  white-space: pre-wrap;   /* 줄바꿈/공백 유지 */
  word-break: break-word;  /* 긴 문자열 줄바꿈 */
}
.explainBox{
  margin-top:6px;
  padding:14px;
  border-radius:14px;
  background:#fafcff;
  border:1px solid var(--border);
  font-size:15px;
  line-height:1.6;
  color:#3a4658;

  white-space: pre-wrap;   /* 줄바꿈/공백 유지 */
  word-break: break-word;  /* 긴 문자열 줄바꿈 */
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media(max-width:480px){
  .controls{grid-template-columns:1fr;}
}
label{
  font-size:12px;
  color:var(--muted);
  display:block;
  margin-bottom:6px;
}
input[type="date"]{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:16px;
  background:#fff;
  -webkit-appearance:none;
}
button{
  padding:12px;
  border-radius:12px;
  border:none;
  background:var(--primary);
  color:white;
  font-size:15px;
  font-weight:700;
}
button.secondary{
  background:#e1e9ff;
  color:var(--primary);
}
.btnRow{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:12px;
  flex-wrap:wrap;
}
.btnGroup{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.miniBtn{
  padding:8px 10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#fff;
  color:var(--text);
  font-size:12px;
  font-weight:700;
}
.miniBtn:hover{filter:brightness(0.98);}

.status{
  margin-top:12px;
  font-size:13px;
  color:var(--muted);
}
</style>
</head>

<body>
<div class="safe">
  <div class="wrap">

    <header>
      <h1>【오사카온누리】오늘의 성경 암송</h1>
      <div class="sub">페이지를 열면 자동으로 오늘 암송이 표시됩니다.</div>
    </header>

    <div class="card">
      <div class="cardPad" id="resultArea"></div>
    </div>

    <div class="card">
      <div class="cardPad">

        <div class="controls">
          <div>
            <label>시작일 (암송1)</label>
            <input id="startDate" type="date"/>
          </div>
          <div>
            <label>조회 날짜</label>
            <input id="targetDate" type="date"/>
          </div>
        </div>

        <div class="btnRow">
          <div class="btnGroup">
            <button id="btnToday" class="secondary" type="button">오늘로</button>
            <button id="btnShow" type="button">조회</button>
          </div>
          <div class="btnGroup">
            <button id="btnPrev" class="secondary" type="button">이전</button>
            <button id="btnNext" class="secondary" type="button">다음</button>
          </div>
        </div>

        <div class="status" id="statusBox"></div>

      </div>
    </div>

  </div>
</div>

<script>
let VERSES = []; // ✅ JSON에서 로드

// ===== 날짜 유틸 (Safari 안정화)
function toUtcDayNumber(str){
  const [y,m,d]=str.split("-").map(Number);
  return Math.floor(Date.UTC(y,m-1,d)/86400000);
}

// ✅ 오늘은 로컬 기준 YYYY-MM-DD
function todayISO(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

// ✅ YYYY-MM-DD에 일수 더하기/빼기 (UTC 자정 기준)
function addDaysISO(str, delta){
  const [y,m,d] = str.split("-").map(Number);
  const ms = Date.UTC(y, m-1, d) + delta * 86400000;
  const nd = new Date(ms);
  const yy = nd.getUTCFullYear();
  const mm = String(nd.getUTCMonth() + 1).padStart(2, "0");
  const dd = String(nd.getUTCDate()).padStart(2, "0");
  return `${yy}-${mm}-${dd}`;
}

const DEFAULT_START="2026-02-08";
const STORAGE_START="memorization_start_v4";

const startInput=document.getElementById("startDate");
const targetInput=document.getElementById("targetDate");
const resultArea=document.getElementById("resultArea");
const statusBox=document.getElementById("statusBox");

// ✅ JSON 로드
async function loadVerses(){
  try{
    const res = await fetch("./verses.json", { cache: "no-store" });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if(!Array.isArray(data) || data.length === 0){
      throw new Error("verses.json 형식이 올바르지 않거나 비어 있습니다.");
    }

    // no 기준 정렬(혹시 순서가 뒤섞여도 안전)
    data.sort((a,b)=>(a.no??0)-(b.no??0));
    VERSES = data;
  }catch(e){
    resultArea.innerHTML = `
      <div class="badge">오류</div>
      <div class="title">암송 데이터를 불러오지 못했습니다</div>
      <div class="meta">verses.json 확인 필요</div>
      <div class="explainBox" style="margin-top:12px;">
        ${String(e)}
        <br/><br/>
        • 같은 폴더에 <b>verses.json</b>이 있는지<br/>
        • 파일이 valid JSON인지<br/>
        • 로컬 파일로 직접 열면(fetch) 차단될 수 있으니 서버/호스팅에서 열었는지 확인해 주세요
      </div>
    `;
    statusBox.textContent = "";
    throw e;
  }
}

// 복사 기능
async function copyText(text){
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
      return true;
    }
  }catch(e){}
  try{
    const ta=document.createElement("textarea");
    ta.value=text;
    ta.style.position="fixed";
    ta.style.opacity="0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok=document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  }catch(e){
    return false;
  }
}

function flashStatus(msg){
  statusBox.textContent = msg;
  setTimeout(()=>{ if(statusBox.textContent === msg) statusBox.textContent=""; }, 2000);
}

function render(){
  const start=startInput.value;
  const target=targetInput.value;
  if(!start||!target) return;

  localStorage.setItem(STORAGE_START,start);

  if(!VERSES.length){
    resultArea.innerHTML="암송 데이터가 없습니다.";
    return;
  }

  const diff=toUtcDayNumber(target)-toUtcDayNumber(start);
  const no=diff+1;

  // ✅ 총 개수는 JSON 기준
  const total = VERSES.length;

  if(no<1||no>total){
    resultArea.innerHTML="범위를 벗어난 날짜입니다.";
    statusBox.textContent="";
    return;
  }

  const v=VERSES[no-1];

  // ✅ 복사용 텍스트 미리 구성
  const verseToCopy   = `${v.ref} (${v.title})\n\n[암송]\n${v.verse}`;
  const explainToCopy = `${v.ref} (${v.title})\n\n[해설]\n${v.explanation}`;
  const allToCopy     = `${v.ref} (${v.title})\n\n[암송]\n${v.verse}\n\n[해설]\n${v.explanation}`;

  resultArea.innerHTML=`
    <div class="badge">암송 ${v.no} / ${total}</div>
    <div class="title">${v.ref} (${v.title})</div>
    <div class="meta">시작일 ${start} · 조회일 ${target}</div>

    <div class="sectionTitleRow">
      <div class="sectionTitle">[암송]</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
        <button class="miniBtn" id="btnCopyAll" type="button">전체 복사</button>
        <button class="miniBtn" id="btnCopyVerse" type="button">암송 복사</button>
      </div>
    </div>
    <div class="verseBox" id="verseText">${v.verse}</div>

    <div class="sectionTitleRow">
      <div class="sectionTitle">[해설]</div>
      <button class="miniBtn" id="btnCopyExplain" type="button">해설 복사</button>
    </div>
    <div class="explainBox" id="explainText">${v.explanation}</div>
  `;

  // ✅ 복사 버튼 이벤트 바인딩
  document.getElementById("btnCopyAll").onclick = async () => {
    const ok = await copyText(allToCopy);
    flashStatus(ok ? "암송+해설이 복사되었습니다." : "복사에 실패했습니다. (브라우저 권한 확인)");
  };
  document.getElementById("btnCopyVerse").onclick = async () => {
    const ok = await copyText(verseToCopy);
    flashStatus(ok ? "암송이 복사되었습니다." : "복사에 실패했습니다. (브라우저 권한 확인)");
  };
  document.getElementById("btnCopyExplain").onclick = async () => {
    const ok = await copyText(explainToCopy);
    flashStatus(ok ? "해설이 복사되었습니다." : "복사에 실패했습니다. (브라우저 권한 확인)");
  };

  statusBox.textContent = `${target===todayISO() ? "오늘 " : ""}암송 ${v.no} (${diff}일째)`;
}

document.getElementById("btnToday").onclick=()=>{
  targetInput.value=todayISO();
  render();
};
document.getElementById("btnShow").onclick=render;

document.getElementById("btnPrev").onclick=()=>{
  if(!targetInput.value) targetInput.value = todayISO();
  targetInput.value = addDaysISO(targetInput.value, -1);
  render();
};
document.getElementById("btnNext").onclick=()=>{
  if(!targetInput.value) targetInput.value = todayISO();
  targetInput.value = addDaysISO(targetInput.value, +1);
  render();
};

startInput.onchange=render;
targetInput.onchange=render;

async function init(){
  await loadVerses(); // ✅ 먼저 데이터 로드
  startInput.value=localStorage.getItem(STORAGE_START)||DEFAULT_START;
  targetInput.value=todayISO();
  render();
}
init();
</script>
</body>
</html>
